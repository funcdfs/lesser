services:
  # Traefik Gateway
  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"      # HTTP 端口
      - "443:443"    # HTTPS 端口
      - "8080:8080"  # 控制面板端口
    volumes:
      - ./gateway/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./gateway/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - ./gateway/certs:/etc/traefik/certs:ro
      - ./gateway/acme.json:/etc/traefik/acme.json
      - /var/run/docker.sock:/var/run/docker.sock:ro  # 允许 Traefik 访问 Docker API
    environment:
      - "TZ=Asia/Shanghai"
    networks:
      - gateway
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.localhost`)"
      - "traefik.http.routers.traefik.service=api@internal"

  # PostgreSQL 数据库
  postgres:
    image: postgres:18
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./docker/postgres/data:/var/lib/postgresql
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_INITDB_ARGS: "-A trust"
    command:
      - postgres
      - -c
      - listen_addresses=0.0.0.0
    networks:
      - gateway

  # Redis 缓存
  redis:
    image: redis:8
    command:
      - redis-server
      - --appendonly
      - yes
    restart: unless-stopped
    volumes:
      - ./docker/redis/data:/data
    networks:
      - gateway

  # Django 后端
  django:
    build: ./backend/django_code
    command: python manage.py runserver 0.0.0.0:8000
    restart: unless-stopped
    volumes:
      - ./backend/django_code:/app
    env_file: .env
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gateway
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.djangoService.loadbalancer.server.port=8000"

  # Golang 热点服务
  golang:
    build: ./backend/golang_hot
    restart: unless-stopped
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gateway
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.golangService.loadbalancer.server.port=8080"

  # Rust Feed 服务
  rust:
    build: ./backend/rust_feed
    restart: unless-stopped
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gateway
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.rustService.loadbalancer.server.port=8081"

  # Nginx 前端服务 (假设前端使用 Nginx 部署)
  frontend:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./frontend/build:/usr/share/nginx/html
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gateway
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.frontendService.loadbalancer.server.port=80"

networks:
  gateway:
    external: false
    name: gateway_network