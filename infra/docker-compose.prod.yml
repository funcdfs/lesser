# ============================================================================
# Docker Compose - Production Environment
# ============================================================================
# gRPC 全面迁移后的配置 - 纯 gRPC 架构
# Usage: docker compose -f infra/docker-compose.prod.yml --env-file infra/env/prod.env up -d
# ============================================================================

services:
  # ==========================================================================
  # INFRA - Infrastructure Services
  # ==========================================================================

  # --------------------------------------------------------------------------
  # API Gateway - Traefik (Production with HTTPS)
  # --------------------------------------------------------------------------
  traefik:
    image: traefik:v3.2
    container_name: traefik
    restart: always
    command:
      - "--configFile=/etc/traefik/traefik.yml"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "${TRAEFIK_HTTP_PORT:-80}:80"
      - "${TRAEFIK_HTTPS_PORT:-443}:443"
      - "${TRAEFIK_GRPC_PORT:-50050}:50050"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./gateway/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./gateway/dynamic:/etc/traefik/dynamic:ro
      - traefik_letsencrypt:/letsencrypt
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # --------------------------------------------------------------------------
  # Database - PostgreSQL (Production)
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:17-alpine
    container_name: postgres
    restart: always
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./database/init-chat.sql:/docker-entrypoint-initdb.d/02-init-chat.sql:ro
      - ../scripts/database/docker-entrypoint-initdb.sh:/docker-entrypoint-initdb.d/03-create-chat-db.sh:ro
      - ./database/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  # --------------------------------------------------------------------------
  # Cache - Redis (Production with Password)
  # --------------------------------------------------------------------------
  redis:
    image: redis:7.4-alpine
    container_name: redis
    restart: always
    command: redis-server /usr/local/etc/redis/redis.conf --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
      - ./cache/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  # --------------------------------------------------------------------------
  # Message Broker - RabbitMQ (Production)
  # --------------------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-superuser}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M


  # ==========================================================================
  # SERVICES - gRPC Service Cluster
  # ==========================================================================

  # --------------------------------------------------------------------------
  # Gateway Service (统一 API 入口 - JWT 验签、限流、路由)
  # --------------------------------------------------------------------------
  gateway:
    build:
      context: ../service
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: gateway
        GRPC_PORT: 50053
    container_name: gateway
    restart: always
    environment:
      - ENV=production
      - GRPC_PORT=${GATEWAY_GRPC_PORT:-50053}
      - AUTH_SERVICE_ADDR=auth:50054
      - USER_SERVICE_ADDR=user:50055
      - CONTENT_SERVICE_ADDR=content:50056
      - INTERACTION_SERVICE_ADDR=interaction:50060
      - COMMENT_SERVICE_ADDR=comment:50061
      - TIMELINE_SERVICE_ADDR=timeline:50062
      - SEARCH_SERVICE_ADDR=search:50058
      - NOTIFICATION_SERVICE_ADDR=notification:50059
      - CHAT_SERVICE_ADDR=chat:50052
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    expose:
      - "50053"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "50053"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 256M

  # --------------------------------------------------------------------------
  # Auth Service (认证服务 - 登录/注册/Token管理)
  # --------------------------------------------------------------------------
  auth:
    build:
      context: ../service
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: auth
        GRPC_PORT: 50054
    container_name: auth
    restart: always
    environment:
      - ENV=production
      - GRPC_PORT=50054
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - DB_SSLMODE=require
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    expose:
      - "50054"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "50054"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # --------------------------------------------------------------------------
  # User Service (用户服务 - 资料/关注)
  # --------------------------------------------------------------------------
  user:
    build:
      context: ../service
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: user
        GRPC_PORT: 50055
    container_name: user
    restart: always
    environment:
      - ENV=production
      - GRPC_PORT=50055
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - DB_SSLMODE=require
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/
    expose:
      - "50055"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "50055"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # --------------------------------------------------------------------------
  # Content Service (内容服务 - Story/Short/Article CRUD)
  # --------------------------------------------------------------------------
  content:
    build:
      context: ../service
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: content
        GRPC_PORT: 50056
    container_name: content
    restart: always
    environment:
      - ENV=production
      - GRPC_PORT=50056
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - DB_SSLMODE=require
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/
    expose:
      - "50056"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "50056"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M


  # --------------------------------------------------------------------------
  # Interaction Service (交互服务 - 点赞/收藏/转发)
  # --------------------------------------------------------------------------
  interaction:
    build:
      context: ../service
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: interaction
        GRPC_PORT: 50060
    container_name: interaction
    restart: always
    environment:
      - ENV=production
      - GRPC_PORT=50060
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - DB_SSLMODE=require
      - CONTENT_SERVICE_ADDR=content:50056
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/
    expose:
      - "50060"
    depends_on:
      postgres:
        condition: service_healthy
      content:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "50060"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # --------------------------------------------------------------------------
  # Comment Service (评论服务)
  # --------------------------------------------------------------------------
  comment:
    build:
      context: ../service
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: comment
        GRPC_PORT: 50061
    container_name: comment
    restart: always
    environment:
      - ENV=production
      - GRPC_PORT=50061
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - DB_SSLMODE=require
      - CONTENT_SERVICE_ADDR=content:50056
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/
    expose:
      - "50061"
    depends_on:
      postgres:
        condition: service_healthy
      content:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "50061"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # --------------------------------------------------------------------------
  # Timeline Service (时间线服务 - Feed 流聚合)
  # --------------------------------------------------------------------------
  timeline:
    build:
      context: ../service
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: timeline
        GRPC_PORT: 50062
    container_name: timeline
    restart: always
    environment:
      - ENV=production
      - GRPC_PORT=50062
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - DB_SSLMODE=require
      - INTERACTION_SERVICE_ADDR=interaction:50060
    expose:
      - "50062"
    depends_on:
      postgres:
        condition: service_healthy
      interaction:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "50062"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # --------------------------------------------------------------------------
  # Search Service (搜索服务)
  # --------------------------------------------------------------------------
  search:
    build:
      context: ../service
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: search
        GRPC_PORT: 50058
    container_name: search
    restart: always
    environment:
      - ENV=production
      - GRPC_PORT=50058
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - DB_SSLMODE=require
    expose:
      - "50058"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "50058"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M


  # --------------------------------------------------------------------------
  # Notification Service (通知服务)
  # --------------------------------------------------------------------------
  notification:
    build:
      context: ../service
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: notification
        GRPC_PORT: 50059
    container_name: notification
    restart: always
    environment:
      - ENV=production
      - GRPC_PORT=50059
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - DB_SSLMODE=require
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/
    expose:
      - "50059"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "50059"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # --------------------------------------------------------------------------
  # Chat Service (聊天服务 - gRPC 双向流)
  # --------------------------------------------------------------------------
  chat:
    build:
      context: ../service
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: chat
        GRPC_PORT: 50052
    restart: always
    environment:
      - ENV=production
      - DATABASE_URL=${CHAT_DATABASE_URL}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/1
      - GRPC_PORT=${CHAT_GRPC_PORT:-50052}
      - AUTH_GRPC_ADDR=auth:50054
    expose:
      - "50052"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "50052"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
      replicas: 2

  # --------------------------------------------------------------------------
  # SuperUser Service (超级管理员服务 - 系统级管理)
  # --------------------------------------------------------------------------
  superuser:
    build:
      context: ../service
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: superuser
        GRPC_PORT: 50063
    container_name: superuser
    restart: always
    environment:
      - ENV=production
      - GRPC_PORT=50063
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - DB_SSLMODE=require
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/2
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/
      - SUPERUSER_USERNAME=${SUPERUSER_USERNAME}
      - SUPERUSER_EMAIL=${SUPERUSER_EMAIL}
      - SUPERUSER_PASSWORD=${SUPERUSER_PASSWORD}
      - SUPERUSER_DISPLAY_NAME=${SUPERUSER_DISPLAY_NAME}
      - SUPERUSER_JWT_SECRET=${SUPERUSER_JWT_SECRET}
    expose:
      - "50063"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "50063"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

# ============================================================================
# Networks
# ============================================================================
networks:
  app-network:
    name: app-network
    driver: bridge

# ============================================================================
# Volumes
# ============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local
  traefik_letsencrypt:
    driver: local
