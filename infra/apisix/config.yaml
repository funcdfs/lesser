---
# APISIX 配置文件 - 最小化配置用于 MVP
# 仅启用必要的插件以支持用户认证流程

plugins:
# 认证相关
- key-auth
- basic-auth
# 流量控制
- limit-conn
- limit-count
- limit-req
# 跨域支持
- cors
# 代理功能
- proxy-rewrite
- response-rewrite
# 日志
- file-logger
# 健康检查
- server-info
deployment:
  role: traditional
  role_traditional:
    config_provider: etcd
  config_provider: etcd
  admin:
    enable_admin_cors: true
    admin_listen:
      ip: 0.0.0.0
      port: 9180
    admin_key:
    - key: fw142857
      name: funcdfs
      role: admin
    enable_admin_ui: true
    allow_admin:
    - 0.0.0.0/0
    admin_key_required: true
    admin_api_version: v3
  etcd:
    host:
    - http://etcd:2379
    watch_timeout: 50
    startup_retry: 2
    tls:
      verify: true
    prefix: /apisix
    timeout: 30
nginx_config:
  max_running_timers: 4096
  meta:
    lua_shared_dict:
      prometheus-metrics: 15m
      status-report: 1m
      prometheus-cache: 10m
      standalone-config: 10m
  error_log: logs/error.log
  error_log_level: warn
  worker_processes: auto
  enable_cpu_affinity: false
  http:
    keepalive_timeout: 60s
    client_header_timeout: 60s
    client_body_timeout: 60s
    upstream:
      keepalive_timeout: 60s
      keepalive_requests: 1000
      keepalive: 320
    send_timeout: 10s
    underscores_in_headers: 'on'
    real_ip_header: X-Real-IP
    real_ip_recursive: 'off'
    real_ip_from:
    - 127.0.0.1
    - 'unix:'
    access_log: logs/access.log
    proxy_ssl_server_name: true
    access_log_format: $remote_addr - $remote_user [$time_local] $http_host "$request"
      $status $body_bytes_sent $request_time "$http_referer" "$http_user_agent" $upstream_addr
      $upstream_status $upstream_response_time "$upstream_scheme://$upstream_host$upstream_uri"
    charset: utf-8
    access_log_format_escape: default
    variables_hash_max_size: 2048
    lua_shared_dict:
      prometheus-metrics: 10m
      mcp-session: 10m
      ocsp-stapling: 10m
      cas-auth: 10m
      tars: 1m
      internal-status: 10m
      upstream-healthcheck: 10m
      worker-events: 10m
      lrucache-lock: 10m
      balancer-ewma: 10m
      balancer-ewma-locks: 10m
      balancer-ewma-last-touched-at: 10m
      etcd-cluster-health-check: 10m
      plugin-ai-rate-limiting: 10m
      plugin-ai-rate-limiting-reset-header: 10m
      plugin-limit-conn: 10m
      plugin-limit-conn-redis-cluster-slot-lock: 1m
      plugin-limit-req-redis-cluster-slot-lock: 1m
      plugin-limit-req: 10m
      plugin-limit-count: 10m
      plugin-limit-count-redis-cluster-slot-lock: 1m
      ext-plugin: 1m
      tracing_buffer: 10m
      plugin-api-breaker: 10m
      discovery: 1m
      jwks: 1m
      introspection: 10m
      access-tokens: 1m
    enable_access_log: true
    access_log_buffer: 16384
    client_max_body_size: 0
  stream_configuration_snippet: ''
  stream:
    enable_access_log: false
    access_log: logs/access_stream.log
    access_log_format: $remote_addr [$time_local] $protocol $status $bytes_sent $bytes_received
      $session_time
    lua_shared_dict:
      etcd-cluster-health-check-stream: 10m
      lrucache-lock-stream: 10m
      plugin-limit-conn-stream: 10m
      worker-events-stream: 10m
      tars-stream: 1m
      upstream-healthcheck-stream: 10m
    access_log_format_escape: default
  main_configuration_snippet: ''
  http_configuration_snippet: ''
  http_server_configuration_snippet: ''
  http_server_location_configuration_snippet: ''
  http_admin_configuration_snippet: ''
  http_end_configuration_snippet: ''
  worker_rlimit_nofile: 20480
  worker_shutdown_timeout: 240s
  event:
    worker_connections: 10620
  max_pending_timers: 16384
upstream:
  keepalive_timeout: 60
  keepalive_requests: 100
  keepalive: 100
plugin_attr:
  proxy-mirror:
    timeout:
      read: 60s
      connect: 60s
      send: 60s
  log-rotate:
    enable_compression: false
    max_kept: 168
    timeout: 10000
    interval: 3600
    max_size: -1
  dubbo-proxy:
    upstream_multiplex_count: 32
  skywalking:
    endpoint_addr: http://127.0.0.1:12800
    service_name: APISIX
    service_instance_name: APISIX Instance Name
    report_interval: 3
  inspect:
    hooks_file: /usr/local/apisix/plugin_inspect_hooks.lua
    delay: 3
  server-info:
    report_ttl: 60
  zipkin:
    set_ngx_var: false
  prometheus:
    metric_prefix: apisix_
    enable_export_server: true
    export_addr:
      ip: 0.0.0.0
      port: 9091
    refresh_interval: 15
    export_uri: /apisix/prometheus/metrics
  opentelemetry:
    trace_id_source: x-request-id
    resource:
      service.name: APISIX
    set_ngx_var: false
    batch_span_processor:
      max_queue_size: 1024
      batch_timeout: 2
      inactive_timeout: 1
      max_export_batch_size: 16
      drop_on_queue_full: false
    collector:
      address: 127.0.0.1:4318
      request_timeout: 3
      request_headers:
        Authorization: token
stream_plugins:
- limit-conn
etcd:
  host:
  - http://etcd:2379
  watch_timeout: 50
  startup_retry: 2
  tls:
    verify: true
  prefix: /apisix
  timeout: 30
apisix:
  extra_lua_path: ''
  extra_lua_cpath: ''
  proxy_mode: http
  disable_upstream_healthcheck: false
  admin_listen:
    ip: 0.0.0.0
    port: 9180
  control:
    ip: 0.0.0.0
    port: 9090
  enable_http2: true
  router:
    http: radixtree_host_uri
    ssl: radixtree_sni
  admin_key:
  - key: fw142857
    name: funcdfs
    role: admin
  enable_server_tokens: true
  resolver_timeout: 5
  allow_admin:
  - 0.0.0.0/0
  show_upstream_status_in_response_header: false
  enable_heartbeat: true
  delete_uri_tail_slash: false
  lru:
    secret:
      count: 512
      ttl: 300
  events:
    module: lua-resty-events
  data_encryption:
    enable_encrypt_fields: true
    keyring:
    - qeddd145sfvddff3
    - edd1c9f0985e76a2
  ssl:
    listen:
    - port: 9443
      enable_http3: false
    ssl_trusted_certificate: /etc/ssl/certs/ca-certificates.crt
    ssl_protocols: TLSv1.2 TLSv1.3
    enable: true
    ssl_session_tickets: false
    ssl_ciphers: ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384
  worker_startup_time_threshold: 60
  enable_admin: true
  normalize_uri_like_servlet: false
  enable_resolv_search_opt: true
  enable_control: true
  disable_sync_configuration_during_start: false
  proxy_cache:
    cache_ttl: 10s
    zones:
    - cache_levels: '1:2'
      memory_size: 50m
      name: disk_cache_one
      disk_size: 1G
      disk_path: /tmp/disk_cache_one
    - memory_size: 50m
      name: memory_cache
  node_listen:
  - port: 9080
    bind: 0.0.0.0
  enable_dev_mode: false
  enable_reuseport: true
  enable_ipv6: true
graphql:
  max_size: 1048576
...
