# ============================================================================
# PostgreSQL Custom Configuration for Development
# ============================================================================

# Connection Settings
listen_addresses = '*'
max_connections = 100

# Logging Configuration - JSON-friendly format
log_destination = 'stderr'
logging_collector = off

# What to log
log_connections = on
log_disconnections = on
log_duration = on
log_statement = 'all'  # 'none', 'ddl', 'mod', 'all'

# Log line prefix - structured format for parsing
# Format: timestamp database user pid
log_line_prefix = '%t [%d] [%u] [%p] '

# Log statement details
log_error_verbosity = default
log_min_error_statement = error
log_min_messages = warning
log_min_duration_statement = 1000  # Log queries taking > 1s

# Performance Logging
log_checkpoints = on
log_lock_waits = on
log_temp_files = 0

# Statement Statistics
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.track = all
