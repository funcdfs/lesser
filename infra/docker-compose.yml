# ============================================================================
# Docker Compose - Development Environment (Hot Reload)
# ============================================================================
# Usage: docker compose -f infra/docker-compose.yml --env-file infra/env/dev.env up -d
# ============================================================================

services:
  # ==========================================================================
  # INFRA - Infrastructure Services
  # ==========================================================================

  # --------------------------------------------------------------------------
  # API Gateway - Traefik
  # --------------------------------------------------------------------------
  traefik:
    image: traefik:latest
    container_name: traefik
    restart: unless-stopped
    command:
      - "--configFile=/etc/traefik/traefik.yml"
    ports:
      - "${TRAEFIK_HTTP_PORT:-80}:80"
      - "${TRAEFIK_DASHBOARD_PORT:-8088}:8080"
      - "${TRAEFIK_GRPC_PORT:-50050}:50050"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./gateway/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./gateway/dynamic:/etc/traefik/dynamic:ro
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # --------------------------------------------------------------------------
  # Database - PostgreSQL
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:latest
    container_name: postgres
    restart: unless-stopped
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lesser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lesser_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-lesser_db}
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./database/init-chat.sql:/docker-entrypoint-initdb.d/02-init-chat.sql:ro
      - ./database/docker-entrypoint-initdb.sh:/docker-entrypoint-initdb.d/03-create-chat-db.sh:ro
      - ./database/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    ports:
      - "${EXTERNAL_POSTGRES_PORT:-5432}:5432"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lesser} -d ${POSTGRES_DB:-lesser_db}"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  # --------------------------------------------------------------------------
  # Cache - Redis
  # --------------------------------------------------------------------------
  redis:
    image: redis:latest
    container_name: redis
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - redis_data:/data
      - ./cache/redis.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      - "${EXTERNAL_REDIS_PORT:-6379}:6379"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 5s

  # --------------------------------------------------------------------------
  # Message Broker - RabbitMQ
  # --------------------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:latest
    container_name: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "${EXTERNAL_RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # --------------------------------------------------------------------------
  # Log Viewer - Dozzle
  # --------------------------------------------------------------------------
  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "${DOZZLE_PORT:-9999}:8080"
    networks:
      - app-network

  # ==========================================================================
  # SERVICES - Application Services (Gateway, Chat HTTP/gRPC)
  # ==========================================================================

  # --------------------------------------------------------------------------
  # Gateway Service (Unified API Gateway with RabbitMQ)
  # --------------------------------------------------------------------------
  gateway:
    build:
      context: ../service/gateway
      dockerfile: Dockerfile.dev
    container_name: gateway
    restart: unless-stopped
    environment:
      - GRPC_PORT=${GATEWAY_GRPC_PORT:-50053}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-lesser}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-lesser_dev_password}
      - DB_NAME=${POSTGRES_DB:-lesser_db}
      - DB_SSLMODE=disable
      - JWT_SECRET=${JWT_SECRET_KEY:-jwt-dev-secret-key}
    volumes:
      - ../service/gateway:/app
      - go_mod_cache:/go/pkg/mod
    ports:
      - "${EXTERNAL_GATEWAY_PORT:-50053}:50053"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "50053"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # --------------------------------------------------------------------------
  # Chat Service (gRPC + WebSocket)
  # --------------------------------------------------------------------------
  chat:
    build:
      context: ../service/chat
      dockerfile: Dockerfile.dev
    container_name: chat
    restart: unless-stopped
    environment:
      - DATABASE_URL=${CHAT_DATABASE_URL:-postgres://lesser:lesser_dev_password@postgres:5432/lesser_chat_db?application_name=chat}
      - REDIS_URL=redis://redis:6379/1
      - WS_PORT=${CHAT_WS_PORT:-8080}
      - GRPC_PORT=${CHAT_GRPC_PORT:-50052}
      - AUTH_GRPC_ADDR=${AUTH_GRPC_ADDR:-gateway:50053}
    volumes:
      - ../service/chat:/app
      - go_mod_cache:/go/pkg/mod
    ports:
      - "${EXTERNAL_CHAT_WS_PORT:-8081}:8080"
      - "50052:50052"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ==========================================================================
  # WORKERS - Background Task Processors (RabbitMQ Consumers)
  # ==========================================================================

  # --------------------------------------------------------------------------
  # Auth Worker
  # --------------------------------------------------------------------------
  auth-worker:
    build:
      context: ../service/auth_worker
      dockerfile: Dockerfile.dev
    container_name: auth-worker
    restart: unless-stopped
    environment:
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-lesser}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-lesser_dev_password}
      - DB_NAME=${POSTGRES_DB:-lesser_db}
      - JWT_SECRET=${JWT_SECRET_KEY:-jwt-dev-secret-key}
    volumes:
      - ../service/auth_worker:/app
      - ../service/pkg:/pkg
      - go_mod_cache:/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - app-network

  # --------------------------------------------------------------------------
  # Post Worker
  # --------------------------------------------------------------------------
  post-worker:
    build:
      context: ../service/post_worker
      dockerfile: Dockerfile.dev
    container_name: post-worker
    restart: unless-stopped
    environment:
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-lesser}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-lesser_dev_password}
      - DB_NAME=${POSTGRES_DB:-lesser_db}
    volumes:
      - ../service/post_worker:/app
      - ../service/pkg:/pkg
      - go_mod_cache:/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - app-network

  # --------------------------------------------------------------------------
  # Feed Worker
  # --------------------------------------------------------------------------
  feed-worker:
    build:
      context: ../service/feed_worker
      dockerfile: Dockerfile.dev
    container_name: feed-worker
    restart: unless-stopped
    environment:
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-lesser}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-lesser_dev_password}
      - DB_NAME=${POSTGRES_DB:-lesser_db}
    volumes:
      - ../service/feed_worker:/app
      - ../service/pkg:/pkg
      - go_mod_cache:/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - app-network

  # --------------------------------------------------------------------------
  # Notification Worker
  # --------------------------------------------------------------------------
  notification-worker:
    build:
      context: ../service/notification_worker
      dockerfile: Dockerfile.dev
    container_name: notification-worker
    restart: unless-stopped
    environment:
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-lesser}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-lesser_dev_password}
      - DB_NAME=${POSTGRES_DB:-lesser_db}
    volumes:
      - ../service/notification_worker:/app
      - ../service/pkg:/pkg
      - go_mod_cache:/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - app-network

  # --------------------------------------------------------------------------
  # User Worker
  # --------------------------------------------------------------------------
  user-worker:
    build:
      context: ../service/user_worker
      dockerfile: Dockerfile.dev
    container_name: user-worker
    restart: unless-stopped
    environment:
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-lesser}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-lesser_dev_password}
      - DB_NAME=${POSTGRES_DB:-lesser_db}
    volumes:
      - ../service/user_worker:/app
      - ../service/pkg:/pkg
      - go_mod_cache:/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - app-network

  # --------------------------------------------------------------------------
  # Search Worker
  # --------------------------------------------------------------------------
  search-worker:
    build:
      context: ../service/search_worker
      dockerfile: Dockerfile.dev
    container_name: search-worker
    restart: unless-stopped
    environment:
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-lesser}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-lesser_dev_password}
      - DB_NAME=${POSTGRES_DB:-lesser_db}
    volumes:
      - ../service/search_worker:/app
      - ../service/pkg:/pkg
      - go_mod_cache:/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - app-network

# ============================================================================
# Networks
# ============================================================================
networks:
  app-network:
    name: app-network
    driver: bridge

# ============================================================================
# Volumes
# ============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local
  go_mod_cache:
    driver: local
