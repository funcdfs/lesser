# ============================================================================
# Docker Compose - Development Environment (Hot Reload)
# ============================================================================
# gRPC 全面迁移后的配置 - 纯 gRPC 架构
# Usage: docker compose -f infra/docker-compose.yml --env-file infra/env/dev.env up -d
# ============================================================================

services:
  # ==========================================================================
  # INFRA - Infrastructure Services
  # ==========================================================================

  # --------------------------------------------------------------------------
  # API Gateway - Traefik
  # --------------------------------------------------------------------------
  traefik:
    image: traefik:latest
    container_name: traefik
    restart: unless-stopped
    command:
      - "--configFile=/etc/traefik/traefik.yml"
    ports:
      - "${TRAEFIK_HTTP_PORT:-80}:80"
      - "${TRAEFIK_DASHBOARD_PORT:-8088}:8080"
      - "${TRAEFIK_GRPC_PORT:-50050}:50050"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./gateway/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./gateway/dynamic:/etc/traefik/dynamic:ro
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # --------------------------------------------------------------------------
  # Database - PostgreSQL
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:latest
    container_name: postgres
    restart: unless-stopped
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lesser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lesser_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-lesser_db}
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./database/init-chat.sql:/docker-entrypoint-initdb.d/02-init-chat.sql:ro
      - ./database/docker-entrypoint-initdb.sh:/docker-entrypoint-initdb.d/03-create-chat-db.sh:ro
      - ./database/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    ports:
      - "${EXTERNAL_POSTGRES_PORT:-5432}:5432"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lesser} -d ${POSTGRES_DB:-lesser_db}"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  # --------------------------------------------------------------------------
  # Cache - Redis
  # --------------------------------------------------------------------------
  redis:
    image: redis:latest
    container_name: redis
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - redis_data:/data
      - ./cache/redis.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      - "${EXTERNAL_REDIS_PORT:-6379}:6379"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 5s

  # --------------------------------------------------------------------------
  # Message Broker - RabbitMQ (仅用于次要异步任务)
  # --------------------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:latest
    container_name: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "${EXTERNAL_RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # --------------------------------------------------------------------------
  # Log Viewer - Dozzle
  # --------------------------------------------------------------------------
  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "${DOZZLE_PORT:-9999}:8080"
    networks:
      - app-network

  # ==========================================================================
  # SERVICES - gRPC Service Cluster
  # ==========================================================================

  # --------------------------------------------------------------------------
  # Gateway Service (统一 API 入口 - JWT 验签、限流、路由)
  # --------------------------------------------------------------------------
  gateway:
    build:
      context: ../service
      dockerfile: gateway/Dockerfile.dev
    container_name: gateway
    restart: unless-stopped
    environment:
      - GRPC_PORT=${GATEWAY_GRPC_PORT:-50053}
      - AUTH_SERVICE_ADDR=auth:50054
      - USER_SERVICE_ADDR=user:50055
      - POST_SERVICE_ADDR=post:50056
      - FEED_SERVICE_ADDR=feed:50057
      - SEARCH_SERVICE_ADDR=search:50058
      - NOTIFICATION_SERVICE_ADDR=notification:50059
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ../service:/app
      - go_mod_cache:/go/pkg/mod
    ports:
      - "${EXTERNAL_GATEWAY_PORT:-50053}:50053"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "50053"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # --------------------------------------------------------------------------
  # Auth Service (认证服务 - 登录/注册/Token管理)
  # --------------------------------------------------------------------------
  auth:
    build:
      context: ../service
      dockerfile: auth/Dockerfile.dev
    container_name: auth
    restart: unless-stopped
    environment:
      - GRPC_PORT=50054
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-lesser}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-lesser_dev_password}
      - DB_NAME=${POSTGRES_DB:-lesser_db}
      - DB_SSLMODE=disable
      - REDIS_URL=redis://redis:6379/0
      - JWT_PRIVATE_KEY_PATH=/app/auth/keys/private.pem
      - JWT_PUBLIC_KEY_PATH=/app/auth/keys/public.pem
    volumes:
      - ../service:/app
      - go_mod_cache:/go/pkg/mod
    ports:
      - "50054:50054"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "50054"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # --------------------------------------------------------------------------
  # User Service (用户服务 - 资料/关注)
  # --------------------------------------------------------------------------
  user:
    build:
      context: ../service
      dockerfile: user/Dockerfile.dev
    container_name: user
    restart: unless-stopped
    environment:
      - GRPC_PORT=50055
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-lesser}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-lesser_dev_password}
      - DB_NAME=${POSTGRES_DB:-lesser_db}
      - DB_SSLMODE=disable
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
    volumes:
      - ../service:/app
      - go_mod_cache:/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "50055"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # --------------------------------------------------------------------------
  # Post Service (帖子服务 - CRUD)
  # --------------------------------------------------------------------------
  post:
    build:
      context: ../service
      dockerfile: post/Dockerfile.dev
    container_name: post
    restart: unless-stopped
    environment:
      - GRPC_PORT=50056
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-lesser}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-lesser_dev_password}
      - DB_NAME=${POSTGRES_DB:-lesser_db}
      - DB_SSLMODE=disable
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
    volumes:
      - ../service:/app
      - go_mod_cache:/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "50056"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # --------------------------------------------------------------------------
  # Feed Service (信息流服务 - 点赞/评论/收藏)
  # --------------------------------------------------------------------------
  feed:
    build:
      context: ../service
      dockerfile: feed/Dockerfile.dev
    container_name: feed
    restart: unless-stopped
    environment:
      - GRPC_PORT=50057
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-lesser}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-lesser_dev_password}
      - DB_NAME=${POSTGRES_DB:-lesser_db}
      - DB_SSLMODE=disable
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
    volumes:
      - ../service:/app
      - go_mod_cache:/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "50057"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # --------------------------------------------------------------------------
  # Search Service (搜索服务)
  # --------------------------------------------------------------------------
  search:
    build:
      context: ../service
      dockerfile: search/Dockerfile.dev
    container_name: search
    restart: unless-stopped
    environment:
      - GRPC_PORT=50058
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-lesser}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-lesser_dev_password}
      - DB_NAME=${POSTGRES_DB:-lesser_db}
      - DB_SSLMODE=disable
    volumes:
      - ../service:/app
      - go_mod_cache:/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "50058"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # --------------------------------------------------------------------------
  # Notification Service (通知服务)
  # --------------------------------------------------------------------------
  notification:
    build:
      context: ../service
      dockerfile: notification/Dockerfile.dev
    container_name: notification
    restart: unless-stopped
    environment:
      - GRPC_PORT=50059
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-lesser}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-lesser_dev_password}
      - DB_NAME=${POSTGRES_DB:-lesser_db}
      - DB_SSLMODE=disable
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
    volumes:
      - ../service:/app
      - go_mod_cache:/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "50059"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # --------------------------------------------------------------------------
  # Chat Service (聊天服务 - gRPC 双向流)
  # --------------------------------------------------------------------------
  chat:
    build:
      context: ../service
      dockerfile: chat/Dockerfile.dev
    container_name: chat
    restart: unless-stopped
    environment:
      - DATABASE_URL=${CHAT_DATABASE_URL:-postgres://lesser:lesser_dev_password@postgres:5432/lesser_chat_db?application_name=chat}
      - REDIS_URL=redis://redis:6379/1
      - GRPC_PORT=${CHAT_GRPC_PORT:-50052}
      - AUTH_GRPC_ADDR=${AUTH_GRPC_ADDR:-auth:50054}
    volumes:
      - ../service:/app
      - go_mod_cache:/go/pkg/mod
    ports:
      - "50052:50052"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "50052"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

# ============================================================================
# Networks
# ============================================================================
networks:
  app-network:
    name: app-network
    driver: bridge

# ============================================================================
# Volumes
# ============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local
  go_mod_cache:
    driver: local
