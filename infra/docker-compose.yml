# ============================================================================
# Docker Compose - Development Environment (Hot Reload)
# ============================================================================
# Usage: docker compose -f infra/docker-compose.yml --env-file infra/.env.dev up -d
# ============================================================================

services:
  # ==========================================================================
  # API Gateway - Traefik
  # ==========================================================================
  traefik:
    image: traefik:latest
    container_name: traefik
    restart: unless-stopped
    command:
      - "--configFile=/etc/traefik/traefik.yml"
    ports:
      - "${TRAEFIK_HTTP_PORT:-80}:80"
      - "${TRAEFIK_DASHBOARD_PORT:-8088}:8080"
      - "${TRAEFIK_GRPC_PORT:-50050}:50050"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./gateway/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./gateway/dynamic:/etc/traefik/dynamic:ro
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ==========================================================================
  # Database - PostgreSQL (Isolated)
  # ==========================================================================
  postgres:
    image: postgres:latest
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lesser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lesser_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-lesser_db}
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${EXTERNAL_POSTGRES_PORT:-5432}:5432"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lesser} -d ${POSTGRES_DB:-lesser_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ==========================================================================
  # Cache - Redis
  # ==========================================================================
  redis:
    image: redis:latest
    container_name: redis
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - redis_data:/data
      - ./cache/redis.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      - "${EXTERNAL_REDIS_PORT:-6379}:6379"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ==========================================================================
  # Django Core Service (Hot Reload with runserver)
  # ==========================================================================
  django:
    build:
      context: ../service/core_django
      dockerfile: Dockerfile
    container_name: django
    restart: unless-stopped
    environment:
      - DJANGO_SETTINGS_MODULE=${DJANGO_SETTINGS_MODULE:-config.settings.dev}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB:-lesser_db}
      - DB_USER=${POSTGRES_USER:-lesser}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-lesser_dev_password}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/3
      - CELERY_RESULT_BACKEND=redis://redis:6379/4
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-django-insecure-dev-key}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-True}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-*}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-jwt-dev-secret-key}
      - GRPC_PORT=${DJANGO_GRPC_PORT:-50051}
    volumes:
      - ../service/core_django:/app
    ports:
      - "${EXTERNAL_DJANGO_PORT:-8000}:8000"
      - "50051:50051"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             python manage.py makemigrations --noinput &&
             python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    networks:
      - app-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.django.rule=PathPrefix(`/api/v1`)"
      - "traefik.http.services.django.loadbalancer.server.port=8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ==========================================================================
  # Celery Worker (Background Tasks)
  # ==========================================================================
  celery-worker:
    build:
      context: ../service/core_django
      dockerfile: Dockerfile
    container_name: celery-worker
    restart: unless-stopped
    environment:
      - DJANGO_SETTINGS_MODULE=${DJANGO_SETTINGS_MODULE:-config.settings.dev}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB:-lesser_db}
      - DB_USER=${POSTGRES_USER:-lesser}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-lesser_dev_password}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/3
      - CELERY_RESULT_BACKEND=redis://redis:6379/4
    volumes:
      - ../service/core_django:/app
    depends_on:
      - django
      - redis
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             celery -A config worker -l INFO"
    networks:
      - app-network

  # ==========================================================================
  # Celery Beat (Scheduled Tasks)
  # ==========================================================================
  celery-beat:
    build:
      context: ../service/core_django
      dockerfile: Dockerfile
    container_name: celery-beat
    restart: unless-stopped
    environment:
      - DJANGO_SETTINGS_MODULE=${DJANGO_SETTINGS_MODULE:-config.settings.dev}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB:-lesser_db}
      - DB_USER=${POSTGRES_USER:-lesser}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-lesser_dev_password}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/3
      - CELERY_RESULT_BACKEND=redis://redis:6379/4
    volumes:
      - ../service/core_django:/app
    depends_on:
      - django
      - redis
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             celery -A config beat -l INFO"
    networks:
      - app-network

  # ==========================================================================
  # Go Chat Service (Hot Reload with Air)
  # ==========================================================================
  chat:
    build:
      context: ../service/chat_gin
      dockerfile: Dockerfile.dev
    container_name: chat
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgres://lesser:lesser_dev_password@postgres:5432/lesser_db}
      - REDIS_URL=redis://redis:6379/1
      - HTTP_PORT=${CHAT_HTTP_PORT:-8080}
      - GRPC_PORT=${CHAT_GRPC_PORT:-50052}
      - AUTH_GRPC_ADDR=${AUTH_GRPC_ADDR:-django:50051}
    volumes:
      - ../service/chat_gin:/app
    ports:
      - "${EXTERNAL_CHAT_PORT:-8081}:8080"
      - "50052:50052"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.chat.rule=PathPrefix(`/api/v1/chat`) || PathPrefix(`/ws/chat`)"
      - "traefik.http.services.chat.loadbalancer.server.port=8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

# ============================================================================
# Networks
# ============================================================================
networks:
  app-network:
    driver: bridge

# ============================================================================
# Volumes (Only for isolated services)
# ============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
