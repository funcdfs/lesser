# ============================================================================
# Docker Compose - Development Environment (Hot Reload)
# ============================================================================
# gRPC 全面迁移后的配置 - 纯 gRPC 架构
# Usage: docker compose -f infra/docker-compose.yml --env-file infra/env/dev.env up -d
# ============================================================================

services:
  # ==========================================================================
  # INFRA - Infrastructure Services
  # ==========================================================================

  # --------------------------------------------------------------------------
  # API Gateway - Traefik
  # --------------------------------------------------------------------------
  traefik:
    image: traefik:latest
    container_name: traefik
    restart: unless-stopped
    command:
      - "--configFile=/etc/traefik/traefik.yml"
    ports:
      - "${TRAEFIK_HTTP_PORT:-80}:80"
      - "${TRAEFIK_DASHBOARD_PORT:-8088}:8080"
      - "${TRAEFIK_GRPC_PORT:-50050}:50050"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./gateway/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./gateway/dynamic:/etc/traefik/dynamic:ro
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # --------------------------------------------------------------------------
  # Database - PostgreSQL (with pgvector)
  # --------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg17
    container_name: postgres
    restart: unless-stopped
    command: postgres -c config_file=/etc/postgresql/postgresql.conf -c shared_preload_libraries=pg_stat_statements
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lesser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lesser_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-lesser_db}
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ../scripts/database/docker-entrypoint-initdb.sh:/docker-entrypoint-initdb.d/02-create-chat-db.sh:ro
      - ./database/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    ports:
      - "${EXTERNAL_POSTGRES_PORT:-5432}:5432"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lesser} -d ${POSTGRES_DB:-lesser_db}"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  # --------------------------------------------------------------------------
  # Cache - Redis
  # --------------------------------------------------------------------------
  redis:
    image: redis:latest
    container_name: redis
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - redis_data:/data
      - ./cache/redis.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      - "${EXTERNAL_REDIS_PORT:-6379}:6379"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 5s

  # --------------------------------------------------------------------------
  # Message Broker - RabbitMQ (仅用于次要异步任务)
  # --------------------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:management
    container_name: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-funcdfs}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-fw142857}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "${EXTERNAL_RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # --------------------------------------------------------------------------
  # Log Viewer - Dozzle
  # --------------------------------------------------------------------------
  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "${DOZZLE_PORT:-9999}:8080"
    networks:
      - app-network

  # --------------------------------------------------------------------------
  # Distributed Tracing - Jaeger
  # --------------------------------------------------------------------------
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    restart: unless-stopped
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"           # Jaeger UI
      - "${JAEGER_OTLP_GRPC_PORT:-4317}:4317"      # OTLP gRPC
      - "${JAEGER_OTLP_HTTP_PORT:-4318}:4318"      # OTLP HTTP
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:16686"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # --------------------------------------------------------------------------
  # Redis GUI - RedisInsight
  # --------------------------------------------------------------------------
  redisinsight:
    image: redis/redisinsight:latest
    container_name: redisinsight
    restart: unless-stopped
    volumes:
      - redisinsight_data:/data
    ports:
      - "${REDISINSIGHT_PORT:-5540}:5540"
    networks:
      - app-network
    depends_on:
      redis:
        condition: service_healthy

  # --------------------------------------------------------------------------
  # Database Monitor - PgHero
  # --------------------------------------------------------------------------
  pghero:
    image: ankane/pghero:latest
    container_name: pghero
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-lesser}:${POSTGRES_PASSWORD:-lesser_dev_password}@postgres:5432/${POSTGRES_DB:-lesser_db}
      PGHERO_USERNAME: ${PGHERO_USERNAME:-superuser}
      PGHERO_PASSWORD: ${PGHERO_PASSWORD:-superuser}
    ports:
      - "${PGHERO_PORT:-8080}:8080"
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy

  # ==========================================================================
  # SERVICES - gRPC Service Cluster
  # ==========================================================================

  # --------------------------------------------------------------------------
  # Gateway Service (统一 API 入口 - JWT 验签、限流、路由)
  # --------------------------------------------------------------------------
  gateway:
    build:
      context: ../service
      dockerfile: Dockerfile.dev
      args:
        SERVICE_NAME: gateway
        GRPC_PORT: 50053
    container_name: gateway
    restart: unless-stopped
    environment:
      - GRPC_PORT=${GATEWAY_GRPC_PORT:-50053}
      - AUTH_SERVICE_ADDR=auth:50054
      - USER_SERVICE_ADDR=user:50055
      - CONTENT_SERVICE_ADDR=content:50056
      - INTERACTION_SERVICE_ADDR=interaction:50060
      - COMMENT_SERVICE_ADDR=comment:50061
      - TIMELINE_SERVICE_ADDR=timeline:50062
      - SEARCH_SERVICE_ADDR=search:50058
      - NOTIFICATION_SERVICE_ADDR=notification:50059
      - CHAT_SERVICE_ADDR=chat:50052
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ../service:/app
      - go_mod_cache:/go/pkg/mod
    ports:
      - "${EXTERNAL_GATEWAY_PORT:-50053}:50053"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "50053"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # --------------------------------------------------------------------------
  # Auth Service (认证服务 - 登录/注册/Token管理)
  # --------------------------------------------------------------------------
  auth:
    build:
      context: ../service
      dockerfile: Dockerfile.dev
      args:
        SERVICE_NAME: auth
        GRPC_PORT: 50054
    container_name: auth
    restart: unless-stopped
    environment:
      - GRPC_PORT=50054
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-lesser}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-lesser_dev_password}
      - DB_NAME=${POSTGRES_DB:-lesser_db}
      - DB_SSLMODE=disable
      - REDIS_URL=redis://redis:6379/0
      - JWT_PRIVATE_KEY_PATH=/app/auth/keys/private.pem
      - JWT_PUBLIC_KEY_PATH=/app/auth/keys/public.pem
    volumes:
      - ../service:/app
      - go_mod_cache:/go/pkg/mod
    ports:
      - "50054:50054"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "50054"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # --------------------------------------------------------------------------
  # User Service (用户服务 - 资料/关注)
  # --------------------------------------------------------------------------
  user:
    build:
      context: ../service
      dockerfile: Dockerfile.dev
      args:
        SERVICE_NAME: user
        GRPC_PORT: 50055
    container_name: user
    restart: unless-stopped
    environment:
      - GRPC_PORT=50055
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-lesser}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-lesser_dev_password}
      - DB_NAME=${POSTGRES_DB:-lesser_db}
      - DB_SSLMODE=disable
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-superuser}:${RABBITMQ_PASSWORD:-superuser}@rabbitmq:5672/
    volumes:
      - ../service:/app
      - go_mod_cache:/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "50055"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # --------------------------------------------------------------------------
  # Content Service (内容服务 - Story/Short/Article CRUD)
  # --------------------------------------------------------------------------
  content:
    build:
      context: ../service
      dockerfile: Dockerfile.dev
      args:
        SERVICE_NAME: content
        GRPC_PORT: 50056
    container_name: content
    restart: unless-stopped
    environment:
      - GRPC_PORT=50056
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-lesser}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-lesser_dev_password}
      - DB_NAME=${POSTGRES_DB:-lesser_db}
      - DB_SSLMODE=disable
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-superuser}:${RABBITMQ_PASSWORD:-superuser}@rabbitmq:5672/
    volumes:
      - ../service:/app
      - go_mod_cache:/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "50056"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # --------------------------------------------------------------------------
  # Interaction Service (交互服务 - 点赞/收藏/转发)
  # --------------------------------------------------------------------------
  interaction:
    build:
      context: ../service
      dockerfile: Dockerfile.dev
      args:
        SERVICE_NAME: interaction
        GRPC_PORT: 50060
    container_name: interaction
    restart: unless-stopped
    environment:
      - GRPC_PORT=50060
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-lesser}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-lesser_dev_password}
      - DB_NAME=${POSTGRES_DB:-lesser_db}
      - DB_SSLMODE=disable
      - CONTENT_SERVICE_ADDR=content:50056
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-superuser}:${RABBITMQ_PASSWORD:-superuser}@rabbitmq:5672/
    volumes:
      - ../service:/app
      - go_mod_cache:/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy
      content:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "50060"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # --------------------------------------------------------------------------
  # Comment Service (评论服务)
  # --------------------------------------------------------------------------
  comment:
    build:
      context: ../service
      dockerfile: Dockerfile.dev
      args:
        SERVICE_NAME: comment
        GRPC_PORT: 50061
    container_name: comment
    restart: unless-stopped
    environment:
      - GRPC_PORT=50061
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-lesser}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-lesser_dev_password}
      - DB_NAME=${POSTGRES_DB:-lesser_db}
      - DB_SSLMODE=disable
      - CONTENT_SERVICE_ADDR=content:50056
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-superuser}:${RABBITMQ_PASSWORD:-superuser}@rabbitmq:5672/
    volumes:
      - ../service:/app
      - go_mod_cache:/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy
      content:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "50061"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # --------------------------------------------------------------------------
  # Timeline Service (时间线服务 - Feed 流聚合)
  # --------------------------------------------------------------------------
  timeline:
    build:
      context: ../service
      dockerfile: Dockerfile.dev
      args:
        SERVICE_NAME: timeline
        GRPC_PORT: 50062
    container_name: timeline
    restart: unless-stopped
    environment:
      - GRPC_PORT=50062
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-lesser}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-lesser_dev_password}
      - DB_NAME=${POSTGRES_DB:-lesser_db}
      - DB_SSLMODE=disable
      - INTERACTION_SERVICE_ADDR=interaction:50060
    volumes:
      - ../service:/app
      - go_mod_cache:/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy
      interaction:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "50062"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # --------------------------------------------------------------------------
  # Search Service (搜索服务)
  # --------------------------------------------------------------------------
  search:
    build:
      context: ../service
      dockerfile: Dockerfile.dev
      args:
        SERVICE_NAME: search
        GRPC_PORT: 50058
    container_name: search
    restart: unless-stopped
    environment:
      - GRPC_PORT=50058
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-lesser}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-lesser_dev_password}
      - DB_NAME=${POSTGRES_DB:-lesser_db}
      - DB_SSLMODE=disable
    volumes:
      - ../service:/app
      - go_mod_cache:/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "50058"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # --------------------------------------------------------------------------
  # Notification Service (通知服务)
  # --------------------------------------------------------------------------
  notification:
    build:
      context: ../service
      dockerfile: Dockerfile.dev
      args:
        SERVICE_NAME: notification
        GRPC_PORT: 50059
    container_name: notification
    restart: unless-stopped
    environment:
      - GRPC_PORT=50059
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-lesser}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-lesser_dev_password}
      - DB_NAME=${POSTGRES_DB:-lesser_db}
      - DB_SSLMODE=disable
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-superuser}:${RABBITMQ_PASSWORD:-superuser}@rabbitmq:5672/
    volumes:
      - ../service:/app
      - go_mod_cache:/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "50059"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # --------------------------------------------------------------------------
  # Chat Service (聊天服务 - gRPC 双向流)
  # --------------------------------------------------------------------------
  chat:
    build:
      context: ../service
      dockerfile: Dockerfile.dev
      args:
        SERVICE_NAME: chat
        GRPC_PORT: 50052
    container_name: chat
    restart: unless-stopped
    environment:
      - DATABASE_URL=${CHAT_DATABASE_URL:-postgres://lesser:lesser_dev_password@postgres:5432/lesser_chat_db?sslmode=disable&application_name=chat}
      - REDIS_URL=redis://redis:6379/1
      - GRPC_PORT=${CHAT_GRPC_PORT:-50052}
      - AUTH_GRPC_ADDR=${AUTH_GRPC_ADDR:-auth:50054}
    volumes:
      - ../service:/app
      - go_mod_cache:/go/pkg/mod
    ports:
      - "50052:50052"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "50052"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # --------------------------------------------------------------------------
  # SuperUser Service (超级管理员服务 - 系统级管理)
  # --------------------------------------------------------------------------
  superuser:
    build:
      context: ../service
      dockerfile: Dockerfile.dev
      args:
        SERVICE_NAME: superuser
        GRPC_PORT: 50063
    container_name: superuser
    restart: unless-stopped
    environment:
      - GRPC_PORT=50063
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-lesser}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-lesser_dev_password}
      - DB_NAME=${POSTGRES_DB:-lesser_db}
      - DB_SSLMODE=disable
      - REDIS_URL=redis://redis:6379/2
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-superuser}:${RABBITMQ_PASSWORD:-superuser}@rabbitmq:5672/
      - SUPERUSER_USERNAME=${SUPERUSER_USERNAME:-funcdfs}
      - SUPERUSER_EMAIL=${SUPERUSER_EMAIL:-funcdfs@gmail.com}
      - SUPERUSER_PASSWORD=${SUPERUSER_PASSWORD:-fw142857}
      - SUPERUSER_DISPLAY_NAME=${SUPERUSER_DISPLAY_NAME:-funcdfs}
      - SUPERUSER_JWT_SECRET=${SUPERUSER_JWT_SECRET:-superuser-secret-key-change-in-production}
    volumes:
      - ../service:/app
      - go_mod_cache:/go/pkg/mod
    ports:
      - "50063:50063"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "50063"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

# ============================================================================
# Networks
# ============================================================================
networks:
  app-network:
    name: app-network
    driver: bridge

# ============================================================================
# Volumes
# ============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local
  go_mod_cache:
    driver: local
  redisinsight_data:
    driver: local
