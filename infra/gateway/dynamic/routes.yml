# ============================================================================
# Traefik Dynamic Routes Configuration
# ============================================================================

http:
  # ============================================================================
  # Routers - HTTP/REST API
  # ============================================================================
  routers:
    # Gateway gRPC-Web Routes (统一 API 入口)
    grpc-web-gateway:
      rule: "PathPrefix(`/grpc/gateway.`)"
      service: gateway-grpc
      entryPoints:
        - web
      middlewares:
        - grpc-web-headers

    # Auth API Routes (通过 Gateway)
    grpc-web-auth:
      rule: "PathPrefix(`/grpc/auth.`)"
      service: gateway-grpc
      entryPoints:
        - web
      middlewares:
        - grpc-web-headers

    # Feed API Routes (通过 Gateway)
    grpc-web-feed:
      rule: "PathPrefix(`/grpc/feed.`)"
      service: gateway-grpc
      entryPoints:
        - web
      middlewares:
        - grpc-web-headers

    # Post API Routes (通过 Gateway)
    grpc-web-post:
      rule: "PathPrefix(`/grpc/post.`)"
      service: gateway-grpc
      entryPoints:
        - web
      middlewares:
        - grpc-web-headers

    # User API Routes (通过 Gateway)
    grpc-web-user:
      rule: "PathPrefix(`/grpc/user.`)"
      service: gateway-grpc
      entryPoints:
        - web
      middlewares:
        - grpc-web-headers

    # Notification API Routes (通过 Gateway)
    grpc-web-notification:
      rule: "PathPrefix(`/grpc/notification.`)"
      service: gateway-grpc
      entryPoints:
        - web
      middlewares:
        - grpc-web-headers

    # Search API Routes (通过 Gateway)
    grpc-web-search:
      rule: "PathPrefix(`/grpc/search.`)"
      service: gateway-grpc
      entryPoints:
        - web
      middlewares:
        - grpc-web-headers

    # Chat Service REST API Routes
    chat-api:
      rule: "PathPrefix(`/api/v1/chat`)"
      service: chat-go
      entryPoints:
        - web
      middlewares:
        - cors-headers

    # WebSocket Routes
    chat-websocket:
      rule: "PathPrefix(`/ws/chat`)"
      service: chat-ws
      entryPoints:
        - web

    # Chat gRPC-Web Routes
    grpc-web-chat:
      rule: "PathPrefix(`/grpc/chat.`)"
      service: chat-grpc
      entryPoints:
        - web
      middlewares:
        - grpc-web-headers

  # ============================================================================
  # gRPC Routers (Internal Service Communication)
  # ============================================================================
    # Gateway gRPC Routes
    grpc-gateway:
      rule: "PathPrefix(`/gateway.`)"
      service: gateway-grpc
      entryPoints:
        - grpc

    grpc-auth:
      rule: "PathPrefix(`/auth.`)"
      service: gateway-grpc
      entryPoints:
        - grpc

    grpc-feed:
      rule: "PathPrefix(`/feed.`)"
      service: gateway-grpc
      entryPoints:
        - grpc

    grpc-post:
      rule: "PathPrefix(`/post.`)"
      service: gateway-grpc
      entryPoints:
        - grpc

    grpc-user:
      rule: "PathPrefix(`/user.`)"
      service: gateway-grpc
      entryPoints:
        - grpc

    grpc-notification:
      rule: "PathPrefix(`/notification.`)"
      service: gateway-grpc
      entryPoints:
        - grpc

    grpc-search:
      rule: "PathPrefix(`/search.`)"
      service: gateway-grpc
      entryPoints:
        - grpc

    grpc-chat:
      rule: "PathPrefix(`/chat.`)"
      service: chat-grpc
      entryPoints:
        - grpc

  # ============================================================================
  # Services
  # ============================================================================
  services:
    # Gateway gRPC 服务 (统一 API 入口)
    gateway-grpc:
      loadBalancer:
        servers:
          - url: "h2c://gateway:50053"

    chat-go:
      loadBalancer:
        servers:
          - url: "http://chat:8080"
        healthCheck:
          path: /health
          interval: "30s"
          timeout: "5s"

    # Chat WebSocket 服务（长连接优化）
    chat-ws:
      loadBalancer:
        servers:
          - url: "http://chat:8080"
        serversTransport: websocket-transport

    chat-grpc:
      loadBalancer:
        servers:
          - url: "h2c://chat:50052"

  # ============================================================================
  # Servers Transports (连接配置)
  # ============================================================================
  serversTransports:
    # WebSocket 专用传输配置，优化长连接
    websocket-transport:
      forwardingTimeouts:
        dialTimeout: "30s"
        responseHeaderTimeout: "0s"    # 禁用响应头超时（WebSocket 需要）
        idleConnTimeout: "300s"        # 5 分钟空闲超时

  # ============================================================================
  # Middlewares
  # ============================================================================
  middlewares:
    cors-headers:
      headers:
        accessControlAllowMethods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
        accessControlAllowHeaders:
          - Content-Type
          - Authorization
          - X-Requested-With
          - Accept
          - Origin
          - X-Trace-ID
          - X-User-ID
        accessControlAllowOriginList:
          - "http://localhost:3000"
          - "http://localhost:3001"
          - "http://localhost:61400"  # Flutter web dev port
          - "http://127.0.0.1:3000"
          - "http://127.0.0.1:3001"
          - "http://127.0.0.1:61400"
        accessControlMaxAge: 86400
        accessControlExposeHeaders:
          - X-Trace-ID
          - X-User-ID
        addVaryHeader: true

    grpc-web-headers:
      headers:
        customRequestHeaders:
          X-Grpc-Web: "true"
        accessControlAllowMethods:
          - POST
          - OPTIONS
        accessControlAllowHeaders:
          - Content-Type
          - X-Grpc-Web
          - X-User-Agent
          - X-Trace-ID
        accessControlAllowOriginList:
          - "*"
        accessControlExposeHeaders:
          - Grpc-Status
          - Grpc-Message

    rate-limit:
      rateLimit:
        average: 100
        burst: 50
        period: 1s
