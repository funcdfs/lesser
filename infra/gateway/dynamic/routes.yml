# ============================================================================
# Traefik Dynamic Routes - gRPC 路由配置
# ============================================================================
# 纯 gRPC + gRPC-Web 架构路由
# ============================================================================

http:
  # ==========================================================================
  # gRPC-Web Routers (Flutter Web 客户端)
  # ==========================================================================
  # 路径前缀 /grpc/ 用于 gRPC-Web 请求
  # ==========================================================================
  routers:
    # Gateway 统一入口
    grpc-web-gateway:
      rule: "PathPrefix(`/grpc/gateway.`)"
      service: gateway-grpc
      entryPoints:
        - web
      middlewares:
        - grpc-web-headers

    # Auth 认证服务
    grpc-web-auth:
      rule: "PathPrefix(`/grpc/auth.`)"
      service: gateway-grpc
      entryPoints:
        - web
      middlewares:
        - grpc-web-headers

    # Feed 时间线
    grpc-web-feed:
      rule: "PathPrefix(`/grpc/feed.`)"
      service: gateway-grpc
      entryPoints:
        - web
      middlewares:
        - grpc-web-headers

    # Post 帖子
    grpc-web-post:
      rule: "PathPrefix(`/grpc/post.`)"
      service: gateway-grpc
      entryPoints:
        - web
      middlewares:
        - grpc-web-headers

    # User 用户
    grpc-web-user:
      rule: "PathPrefix(`/grpc/user.`)"
      service: gateway-grpc
      entryPoints:
        - web
      middlewares:
        - grpc-web-headers

    # Notification 通知
    grpc-web-notification:
      rule: "PathPrefix(`/grpc/notification.`)"
      service: gateway-grpc
      entryPoints:
        - web
      middlewares:
        - grpc-web-headers

    # Search 搜索
    grpc-web-search:
      rule: "PathPrefix(`/grpc/search.`)"
      service: gateway-grpc
      entryPoints:
        - web
      middlewares:
        - grpc-web-headers

    # Chat 聊天（双向流）
    grpc-web-chat:
      rule: "PathPrefix(`/grpc/chat.`)"
      service: chat-grpc
      entryPoints:
        - web
      middlewares:
        - grpc-web-headers
        - grpc-stream-timeout

    # SuperUser 超级管理员
    grpc-web-superuser:
      rule: "PathPrefix(`/grpc/superuser.`)"
      service: superuser-grpc
      entryPoints:
        - web
      middlewares:
        - grpc-web-headers

  # ==========================================================================
  # Native gRPC Routers (移动端 / 服务间通信)
  # ==========================================================================
    grpc-gateway:
      rule: "PathPrefix(`/gateway.`)"
      service: gateway-grpc
      entryPoints:
        - grpc

    grpc-auth:
      rule: "PathPrefix(`/auth.`)"
      service: gateway-grpc
      entryPoints:
        - grpc

    grpc-feed:
      rule: "PathPrefix(`/feed.`)"
      service: gateway-grpc
      entryPoints:
        - grpc

    grpc-post:
      rule: "PathPrefix(`/post.`)"
      service: gateway-grpc
      entryPoints:
        - grpc

    grpc-user:
      rule: "PathPrefix(`/user.`)"
      service: gateway-grpc
      entryPoints:
        - grpc

    grpc-notification:
      rule: "PathPrefix(`/notification.`)"
      service: gateway-grpc
      entryPoints:
        - grpc

    grpc-search:
      rule: "PathPrefix(`/search.`)"
      service: gateway-grpc
      entryPoints:
        - grpc

    # Chat 双向流（禁用超时）
    grpc-chat:
      rule: "PathPrefix(`/chat.`)"
      service: chat-grpc
      entryPoints:
        - grpc

    # SuperUser 独立服务
    grpc-superuser:
      rule: "PathPrefix(`/superuser.`)"
      service: superuser-grpc
      entryPoints:
        - grpc

  # ==========================================================================
  # Services - gRPC 后端服务
  # ==========================================================================
  services:
    # Gateway 统一 API 入口
    gateway-grpc:
      loadBalancer:
        servers:
          - url: "h2c://gateway:50053"

    # Chat 双向流服务
    chat-grpc:
      loadBalancer:
        servers:
          - url: "h2c://chat:50052"
        serversTransport: grpc-stream-transport

    # SuperUser 超级管理员服务
    superuser-grpc:
      loadBalancer:
        servers:
          - url: "h2c://superuser:50063"

  # ==========================================================================
  # Servers Transports - 连接配置
  # ==========================================================================
  serversTransports:
    # gRPC 双向流专用（禁用超时保持长连接）
    grpc-stream-transport:
      forwardingTimeouts:
        dialTimeout: "30s"
        responseHeaderTimeout: "0s"
        idleConnTimeout: "0s"

  # ==========================================================================
  # Middlewares - 中间件
  # ==========================================================================
  middlewares:
    # gRPC-Web CORS 头
    grpc-web-headers:
      headers:
        customRequestHeaders:
          X-Grpc-Web: "true"
        accessControlAllowMethods:
          - POST
          - OPTIONS
        accessControlAllowHeaders:
          - Content-Type
          - X-Grpc-Web
          - X-User-Agent
          - X-Trace-ID
          - Authorization
        accessControlAllowOriginList:
          - "*"
        accessControlExposeHeaders:
          - Grpc-Status
          - Grpc-Message

    # 双向流超时配置
    grpc-stream-timeout:
      headers:
        customResponseHeaders:
          X-Stream-Timeout: "0"

    # 限流中间件
    rate-limit:
      rateLimit:
        average: 100
        burst: 50
        period: 1s
