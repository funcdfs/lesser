# ============================================================================
# Traefik Dynamic Routes Configuration
# gRPC 全面迁移后的路由配置 - 纯 gRPC + gRPC-Web
# ============================================================================

http:
  # ============================================================================
  # gRPC-Web Routers (Flutter Web 客户端使用)
  # ============================================================================
  routers:
    # Gateway gRPC-Web Routes (统一 API 入口)
    grpc-web-gateway:
      rule: "PathPrefix(`/grpc/gateway.`)"
      service: gateway-grpc
      entryPoints:
        - web
      middlewares:
        - grpc-web-headers

    # Auth API Routes (通过 Gateway)
    grpc-web-auth:
      rule: "PathPrefix(`/grpc/auth.`)"
      service: gateway-grpc
      entryPoints:
        - web
      middlewares:
        - grpc-web-headers

    # Feed API Routes (通过 Gateway)
    grpc-web-feed:
      rule: "PathPrefix(`/grpc/feed.`)"
      service: gateway-grpc
      entryPoints:
        - web
      middlewares:
        - grpc-web-headers

    # Post API Routes (通过 Gateway)
    grpc-web-post:
      rule: "PathPrefix(`/grpc/post.`)"
      service: gateway-grpc
      entryPoints:
        - web
      middlewares:
        - grpc-web-headers

    # User API Routes (通过 Gateway)
    grpc-web-user:
      rule: "PathPrefix(`/grpc/user.`)"
      service: gateway-grpc
      entryPoints:
        - web
      middlewares:
        - grpc-web-headers

    # Notification API Routes (通过 Gateway)
    grpc-web-notification:
      rule: "PathPrefix(`/grpc/notification.`)"
      service: gateway-grpc
      entryPoints:
        - web
      middlewares:
        - grpc-web-headers

    # Search API Routes (通过 Gateway)
    grpc-web-search:
      rule: "PathPrefix(`/grpc/search.`)"
      service: gateway-grpc
      entryPoints:
        - web
      middlewares:
        - grpc-web-headers

    # Chat gRPC-Web Routes (双向流)
    grpc-web-chat:
      rule: "PathPrefix(`/grpc/chat.`)"
      service: chat-grpc
      entryPoints:
        - web
      middlewares:
        - grpc-web-headers
        - grpc-stream-timeout

  # ============================================================================
  # gRPC Routers (Native gRPC - 移动端/服务间通信)
  # ============================================================================
    # Gateway gRPC Routes
    grpc-gateway:
      rule: "PathPrefix(`/gateway.`)"
      service: gateway-grpc
      entryPoints:
        - grpc

    grpc-auth:
      rule: "PathPrefix(`/auth.`)"
      service: gateway-grpc
      entryPoints:
        - grpc

    grpc-feed:
      rule: "PathPrefix(`/feed.`)"
      service: gateway-grpc
      entryPoints:
        - grpc

    grpc-post:
      rule: "PathPrefix(`/post.`)"
      service: gateway-grpc
      entryPoints:
        - grpc

    grpc-user:
      rule: "PathPrefix(`/user.`)"
      service: gateway-grpc
      entryPoints:
        - grpc

    grpc-notification:
      rule: "PathPrefix(`/notification.`)"
      service: gateway-grpc
      entryPoints:
        - grpc

    grpc-search:
      rule: "PathPrefix(`/search.`)"
      service: gateway-grpc
      entryPoints:
        - grpc

    # Chat gRPC Routes (双向流 - 禁用超时)
    grpc-chat:
      rule: "PathPrefix(`/chat.`)"
      service: chat-grpc
      entryPoints:
        - grpc

  # ============================================================================
  # Services
  # ============================================================================
  services:
    # Gateway gRPC 服务 (统一 API 入口)
    gateway-grpc:
      loadBalancer:
        servers:
          - url: "h2c://gateway:50053"

    # Chat gRPC 服务 (双向流)
    chat-grpc:
      loadBalancer:
        servers:
          - url: "h2c://chat:50052"
        serversTransport: grpc-stream-transport

  # ============================================================================
  # Servers Transports (连接配置)
  # ============================================================================
  serversTransports:
    # gRPC 双向流专用传输配置，禁用超时
    grpc-stream-transport:
      forwardingTimeouts:
        dialTimeout: "30s"
        responseHeaderTimeout: "0s"    # 禁用响应头超时（双向流需要）
        idleConnTimeout: "0s"          # 禁用空闲超时（保持长连接）

  # ============================================================================
  # Middlewares
  # ============================================================================
  middlewares:
    grpc-web-headers:
      headers:
        customRequestHeaders:
          X-Grpc-Web: "true"
        accessControlAllowMethods:
          - POST
          - OPTIONS
        accessControlAllowHeaders:
          - Content-Type
          - X-Grpc-Web
          - X-User-Agent
          - X-Trace-ID
          - Authorization
        accessControlAllowOriginList:
          - "*"
        accessControlExposeHeaders:
          - Grpc-Status
          - Grpc-Message

    # gRPC 双向流超时配置
    grpc-stream-timeout:
      headers:
        customResponseHeaders:
          X-Stream-Timeout: "0"

    rate-limit:
      rateLimit:
        average: 100
        burst: 50
        period: 1s
