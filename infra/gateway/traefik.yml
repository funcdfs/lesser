# ============================================================================
# Traefik Static Configuration
# ============================================================================
# 优化版本 - 支持本地域名访问各服务控制面板
# ============================================================================

# API and Dashboard
api:
  dashboard: true
  insecure: true  # 仅开发环境，生产环境需禁用

# Entry Points
entryPoints:
  # HTTP 入口 - 用于 Web 控制面板和 gRPC-Web
  web:
    address: ":80"
    # 可选：HTTP 自动重定向到 HTTPS（生产环境启用）
    # http:
    #   redirections:
    #     entryPoint:
    #       to: websecure
    #       scheme: https

  # gRPC 入口 - 原生 gRPC 通信
  grpc:
    address: ":50050"
    http2:
      maxConcurrentStreams: 250

# Providers
providers:
  # Docker 自动发现（通过 labels 配置路由）
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: app-network
    # 监控 Docker 事件，自动更新路由
    watch: true

  # 文件配置（gRPC 路由等）
  file:
    directory: "/etc/traefik/dynamic"
    watch: true

# Logging
log:
  level: INFO
  format: json

accessLog:
  format: json
  fields:
    defaultMode: keep
    headers:
      defaultMode: keep
      names:
        X-Trace-ID: keep
  filters:
    statusCodes:
      - "200-299"
      - "400-599"

# Health Check
ping:
  entryPoint: web
