syntax = "proto3";
package auth;

option go_package = "github.com/funcdfs/lesser/auth/gen_protos/auth";

import "common/common.proto";

// ============================================================================
// AuthService 认证服务 (端口: 50052)
// 处理用户登录、注册、Token 管理
// Gateway 启动时获取公钥用于本地 JWT 验签
// ============================================================================

service AuthService {
  // ---- 用户认证 ----
  rpc Register(RegisterRequest) returns (AuthResponse);       // 用户注册
  rpc Login(LoginRequest) returns (AuthResponse);             // 用户登录
  rpc Logout(LogoutRequest) returns (common.Empty);           // 用户登出
  rpc RefreshToken(RefreshRequest) returns (AuthResponse);    // 刷新 Token
  
  // ---- JWT 公钥 ----
  rpc GetPublicKey(GetPublicKeyRequest) returns (GetPublicKeyResponse);  // 获取公钥
  
  // ---- 用户管理 ----
  rpc GetUser(GetUserRequest) returns (User);                 // 获取用户信息
  rpc BanUser(BanUserRequest) returns (BanUserResponse);      // 封禁用户
  rpc CheckBanned(CheckBannedRequest) returns (CheckBannedResponse);  // 检查封禁状态
}

// ============================================================================
// 实体定义
// ============================================================================

// User 用户实体
message User {
  string id = 1;
  string username = 2;
  string email = 3;
  string display_name = 4;
  string avatar_url = 5;
  string bio = 6;
  common.Timestamp created_at = 7;
}

// ============================================================================
// 认证相关消息
// ============================================================================

message RegisterRequest {
  string username = 1;
  string email = 2;
  string password = 3;
  string display_name = 4;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message AuthResponse {
  User user = 1;
  string access_token = 2;
  string refresh_token = 3;
}

message LogoutRequest {
  string access_token = 1;
}

message RefreshRequest {
  string refresh_token = 1;
}

// ============================================================================
// JWT 公钥相关消息
// ============================================================================

message GetPublicKeyRequest {}

message GetPublicKeyResponse {
  string public_key = 1;   // PEM 格式公钥
  string key_id = 2;       // Key ID（密钥轮换用）
  string algorithm = 3;    // 签名算法，如 "RS256"
  int64 expires_at = 4;    // 公钥过期时间戳（Unix 秒）
}

// ============================================================================
// 用户管理相关消息
// ============================================================================

message GetUserRequest {
  string user_id = 1;
}

message BanUserRequest {
  string user_id = 1;
  string reason = 2;
  int64 duration_seconds = 3;  // 0 表示永久封禁
}

message BanUserResponse {
  bool success = 1;
}

message CheckBannedRequest {
  string user_id = 1;
}

message CheckBannedResponse {
  bool banned = 1;
  string reason = 2;
  int64 expires_at = 3;  // 封禁到期时间戳，0 表示永久
}
