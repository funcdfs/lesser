syntax = "proto3";
package interaction;

option go_package = "github.com/funcdfs/lesser/interaction/gen_protos/interaction";

import "common/common.proto";

// ============================================================================
// InteractionService 交互服务 (端口: 50056)
// 提供点赞、收藏、转发功能
// ============================================================================

service InteractionService {
  // ---- 点赞 ----
  rpc Like(LikeRequest) returns (LikeResponse);
  rpc Unlike(UnlikeRequest) returns (UnlikeResponse);
  rpc CheckLiked(CheckLikedRequest) returns (CheckLikedResponse);
  
  // ---- 收藏 ----
  rpc Bookmark(BookmarkRequest) returns (BookmarkResponse);
  rpc Unbookmark(UnbookmarkRequest) returns (UnbookmarkResponse);
  rpc ListBookmarks(ListBookmarksRequest) returns (ListBookmarksResponse);
  
  // ---- 转发 ----
  rpc CreateRepost(CreateRepostRequest) returns (CreateRepostResponse);
  rpc DeleteRepost(DeleteRepostRequest) returns (DeleteRepostResponse);
  
  // ---- 批量查询 ----
  rpc BatchGetInteractionStatus(BatchGetInteractionStatusRequest) returns (BatchGetInteractionStatusResponse);
}

// ============================================================================
// 实体定义
// ============================================================================

message Repost {
  string id = 1;
  string user_id = 2;
  string content_id = 3;
  string quote = 4;
  common.Timestamp created_at = 5;
}

message Bookmark {
  string id = 1;
  string user_id = 2;
  string content_id = 3;
  common.Timestamp created_at = 4;
}

message UserInteractionStatus {
  string content_id = 1;
  bool is_liked = 2;
  bool is_bookmarked = 3;
  bool is_reposted = 4;
}

// ============================================================================
// 点赞
// ============================================================================

message LikeRequest {
  string user_id = 1;
  string content_id = 2;
}

message LikeResponse {
  bool success = 1;
  int32 like_count = 2;
}

message UnlikeRequest {
  string user_id = 1;
  string content_id = 2;
}

message UnlikeResponse {
  bool success = 1;
  int32 like_count = 2;
}

message CheckLikedRequest {
  string user_id = 1;
  string content_id = 2;
}

message CheckLikedResponse {
  bool is_liked = 1;
}

// ============================================================================
// 收藏
// ============================================================================

message BookmarkRequest {
  string user_id = 1;
  string content_id = 2;
}

message BookmarkResponse {
  bool success = 1;
  int32 bookmark_count = 2;
}

message UnbookmarkRequest {
  string user_id = 1;
  string content_id = 2;
}

message UnbookmarkResponse {
  bool success = 1;
  int32 bookmark_count = 2;
}

message ListBookmarksRequest {
  string user_id = 1;
  common.Pagination pagination = 2;
}

message ListBookmarksResponse {
  repeated Bookmark bookmarks = 1;
  common.Pagination pagination = 2;
}

// ============================================================================
// 转发
// ============================================================================

message CreateRepostRequest {
  string user_id = 1;
  string content_id = 2;
  string quote = 3;
}

message CreateRepostResponse {
  Repost repost = 1;
  int32 repost_count = 2;
}

message DeleteRepostRequest {
  string user_id = 1;
  string content_id = 2;
}

message DeleteRepostResponse {
  bool success = 1;
  int32 repost_count = 2;
}

// ============================================================================
// 批量查询
// ============================================================================

message BatchGetInteractionStatusRequest {
  string user_id = 1;
  repeated string content_ids = 2;
}

message BatchGetInteractionStatusResponse {
  repeated UserInteractionStatus statuses = 1;
}
