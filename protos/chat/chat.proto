syntax = "proto3";
package chat;

option go_package = "github.com/lesser/chat/proto/chat";

import "common/common.proto";

// 聊天服务 - 处理实时消息
service ChatService {
  // 获取用户的所有会话
  rpc GetConversations(GetConversationsRequest) returns (ConversationsResponse);
  // 根据ID获取单个会话
  rpc GetConversation(GetConversationRequest) returns (Conversation);
  // 创建新会话
  rpc CreateConversation(CreateConversationRequest) returns (Conversation);
  // 获取会话中的消息
  rpc GetMessages(GetMessagesRequest) returns (MessagesResponse);
  // 发送消息到会话
  rpc SendMessage(SendMessageRequest) returns (Message);
  // 实时消息流
  rpc StreamMessages(StreamRequest) returns (stream Message);
  // 标记单条消息为已读
  rpc MarkAsRead(MarkAsReadRequest) returns (ReadReceipt);
  // 标记会话中所有消息为已读
  rpc MarkConversationAsRead(MarkConversationAsReadRequest) returns (BatchReadReceipt);
  // 批量获取多个会话的未读数
  rpc GetUnreadCounts(GetUnreadCountsRequest) returns (GetUnreadCountsResponse);
}

// 会话类型枚举
enum ConversationType {
  PRIVATE = 0;  // 一对一私聊
  GROUP = 1;    // 多人群聊
  CHANNEL = 2;  // 广播频道
}

// 会话实体
message Conversation {
  string id = 1;
  ConversationType type = 2;
  string name = 3;
  repeated string member_ids = 4;
  string creator_id = 5;
  common.Timestamp created_at = 6;
  Message last_message = 7;
}

// 消息实体
message Message {
  string id = 1;
  string conversation_id = 2;
  string sender_id = 3;
  string content = 4;
  string message_type = 5;  // text, image, file
  common.Timestamp created_at = 6;
  common.Timestamp read_at = 7;  // 已读时间戳，null 表示未读
}

// 单条消息已读回执
message ReadReceipt {
  string message_id = 1;
  string conversation_id = 2;
  string reader_id = 3;
  common.Timestamp read_at = 4;
}

// 批量已读回执
message BatchReadReceipt {
  string conversation_id = 1;
  string reader_id = 2;
  repeated string message_ids = 3;
  common.Timestamp read_at = 4;
}

// 获取用户会话请求
message GetConversationsRequest {
  string user_id = 1;
  common.Pagination pagination = 2;
}

// 会话列表响应
message ConversationsResponse {
  repeated Conversation conversations = 1;
  common.Pagination pagination = 2;
}

// 获取单个会话请求
message GetConversationRequest {
  string conversation_id = 1;
}

// 创建会话请求
message CreateConversationRequest {
  ConversationType type = 1;
  string name = 2;
  repeated string member_ids = 3;
  string creator_id = 4;
}

// 获取消息请求
message GetMessagesRequest {
  string conversation_id = 1;
  common.Pagination pagination = 2;
}

// 消息列表响应
message MessagesResponse {
  repeated Message messages = 1;
  common.Pagination pagination = 2;
}

// 发送消息请求
message SendMessageRequest {
  string conversation_id = 1;
  string sender_id = 2;
  string content = 3;
  string message_type = 4;
}

// 实时消息流请求
message StreamRequest {
  string user_id = 1;
}

// 标记单条消息已读请求
message MarkAsReadRequest {
  string message_id = 1;
  string user_id = 2;
}

// 标记会话所有消息已读请求
message MarkConversationAsReadRequest {
  string conversation_id = 1;
  string user_id = 2;
}

// 批量获取未读数请求
message GetUnreadCountsRequest {
  string user_id = 1;
  repeated string conversation_ids = 2;
}

// 单个会话的未读数
message UnreadCount {
  string conversation_id = 1;
  int64 count = 2;
}

// 批量获取未读数响应
message GetUnreadCountsResponse {
  repeated UnreadCount unread_counts = 1;
}

// WebSocket 已读回执推送通知
message ReadReceiptNotification {
  string type = 1;  // "read_receipt" 单条, "read_receipt_batch" 批量
  string message_id = 2;  // 单条已读时使用
  string conversation_id = 3;
  string reader_id = 4;
  common.Timestamp read_at = 5;
  repeated string message_ids = 6;  // 批量已读时使用
}
