syntax = "proto3";
package chat;

option go_package = "github.com/funcdfs/lesser/chat/gen_protos/chat";

import "common/common.proto";

// ChatService 聊天服务
// 处理会话管理、消息收发、实时通信
service ChatService {
  // 获取用户的所有会话
  rpc GetConversations(GetConversationsRequest) returns (ConversationsResponse);
  // 根据 ID 获取单个会话
  rpc GetConversation(GetConversationRequest) returns (Conversation);
  // 创建新会话
  rpc CreateConversation(CreateConversationRequest) returns (Conversation);
  // 获取会话中的消息
  rpc GetMessages(GetMessagesRequest) returns (MessagesResponse);
  // 发送消息到会话
  rpc SendMessage(SendMessageRequest) returns (Message);
  // 标记单条消息为已读
  rpc MarkAsRead(MarkAsReadRequest) returns (ReadReceipt);
  // 标记会话中所有消息为已读
  rpc MarkConversationAsRead(MarkConversationAsReadRequest) returns (BatchReadReceipt);
  // 批量获取多个会话的未读数
  rpc GetUnreadCounts(GetUnreadCountsRequest) returns (GetUnreadCountsResponse);
  
  // 双向流：实时事件（替代 WebSocket）
  // 客户端通过此流订阅会话、发送消息、接收实时事件
  rpc StreamEvents(stream ClientEvent) returns (stream ServerEvent);
}

// ============================================================================
// 会话相关消息
// ============================================================================

// ConversationType 会话类型
enum ConversationType {
  PRIVATE = 0;  // 一对一私聊
  GROUP = 1;    // 多人群聊
  CHANNEL = 2;  // 广播频道
}

// Conversation 会话实体
message Conversation {
  string id = 1;
  ConversationType type = 2;
  string name = 3;
  repeated string member_ids = 4;
  string creator_id = 5;
  common.Timestamp created_at = 6;
  Message last_message = 7;
  int64 unread_count = 8;
}

// Message 消息实体
message Message {
  string id = 1;
  string conversation_id = 2;
  string sender_id = 3;
  string content = 4;
  string message_type = 5;  // text, image, file, video, link, system
  common.Timestamp created_at = 6;
  common.Timestamp read_at = 7;  // 已读时间戳，null 表示未读
}


// ReadReceipt 单条消息已读回执
message ReadReceipt {
  string message_id = 1;
  string conversation_id = 2;
  string reader_id = 3;
  common.Timestamp read_at = 4;
}

// BatchReadReceipt 批量已读回执
message BatchReadReceipt {
  string conversation_id = 1;
  string reader_id = 2;
  repeated string message_ids = 3;
  common.Timestamp read_at = 4;
}

// ============================================================================
// 请求/响应消息
// ============================================================================

// GetConversationsRequest 获取会话列表请求
message GetConversationsRequest {
  string user_id = 1;
  common.Pagination pagination = 2;
}

// ConversationsResponse 会话列表响应
message ConversationsResponse {
  repeated Conversation conversations = 1;
  common.Pagination pagination = 2;
}

// GetConversationRequest 获取单个会话请求
message GetConversationRequest {
  string conversation_id = 1;
}

// CreateConversationRequest 创建会话请求
message CreateConversationRequest {
  ConversationType type = 1;
  string name = 2;
  repeated string member_ids = 3;
  string creator_id = 4;
}

// GetMessagesRequest 获取消息列表请求
message GetMessagesRequest {
  string conversation_id = 1;
  common.Pagination pagination = 2;
}

// MessagesResponse 消息列表响应
message MessagesResponse {
  repeated Message messages = 1;
  common.Pagination pagination = 2;
}

// SendMessageRequest 发送消息请求
message SendMessageRequest {
  string conversation_id = 1;
  string sender_id = 2;
  string content = 3;
  string message_type = 4;
}

// MarkAsReadRequest 标记单条消息已读请求
message MarkAsReadRequest {
  string message_id = 1;
  string user_id = 2;
}

// MarkConversationAsReadRequest 标记会话所有消息已读请求
message MarkConversationAsReadRequest {
  string conversation_id = 1;
  string user_id = 2;
}

// GetUnreadCountsRequest 批量获取未读数请求
message GetUnreadCountsRequest {
  string user_id = 1;
  repeated string conversation_ids = 2;
}

// UnreadCount 单个会话的未读数
message UnreadCount {
  string conversation_id = 1;
  int64 count = 2;
}

// GetUnreadCountsResponse 批量获取未读数响应
message GetUnreadCountsResponse {
  repeated UnreadCount unread_counts = 1;
}


// ============================================================================
// 双向流事件消息（替代 WebSocket）
// ============================================================================

// ClientEvent 客户端发送的事件
message ClientEvent {
  oneof event {
    SubscribeRequest subscribe = 1;
    UnsubscribeRequest unsubscribe = 2;
    SendMessageEvent send_message = 3;
    PingEvent ping = 4;
    TypingEvent typing = 5;
  }
}

// SubscribeRequest 订阅会话请求
message SubscribeRequest {
  string conversation_id = 1;
}

// UnsubscribeRequest 取消订阅请求
message UnsubscribeRequest {
  string conversation_id = 1;
}

// SendMessageEvent 通过流发送消息事件
message SendMessageEvent {
  string conversation_id = 1;
  string content = 2;
  string message_type = 3;
  string client_message_id = 4;  // 客户端生成的临时 ID，用于乐观更新
}

// PingEvent 心跳事件
message PingEvent {}

// TypingEvent 正在输入事件
message TypingEvent {
  string conversation_id = 1;
  bool is_typing = 2;
}

// ServerEvent 服务端推送的事件
message ServerEvent {
  oneof event {
    NewMessageEvent new_message = 1;
    MessageReadEvent message_read = 2;
    ConversationUpdateEvent conversation_update = 3;
    UnreadCountUpdateEvent unread_update = 4;
    UserStatusEvent user_status = 5;
    TypingIndicatorEvent typing_indicator = 6;
    SubscribedEvent subscribed = 7;
    UnsubscribedEvent unsubscribed = 8;
    PongEvent pong = 9;
    ErrorEvent error = 10;
    MessageSentEvent message_sent = 11;
  }
}

// NewMessageEvent 新消息事件
message NewMessageEvent {
  Message message = 1;
}

// MessageReadEvent 消息已读事件
message MessageReadEvent {
  string message_id = 1;
  string conversation_id = 2;
  string reader_id = 3;
  common.Timestamp read_at = 4;
  repeated string message_ids = 5;  // 批量已读时使用
}

// ConversationUpdateEvent 会话更新事件
message ConversationUpdateEvent {
  string conversation_id = 1;
  Message last_message = 2;
  int64 unread_count = 3;
}

// UnreadCountUpdateEvent 未读数更新事件
message UnreadCountUpdateEvent {
  string conversation_id = 1;
  int64 count = 2;
}

// UserStatusEvent 用户在线状态事件
message UserStatusEvent {
  string user_id = 1;
  bool is_online = 2;
  common.Timestamp last_seen = 3;
}

// TypingIndicatorEvent 正在输入指示器事件
message TypingIndicatorEvent {
  string conversation_id = 1;
  string user_id = 2;
  bool is_typing = 3;
}

// SubscribedEvent 订阅成功事件
message SubscribedEvent {
  string conversation_id = 1;
}

// UnsubscribedEvent 取消订阅成功事件
message UnsubscribedEvent {
  string conversation_id = 1;
}

// PongEvent 心跳响应
message PongEvent {}

// ErrorEvent 错误事件
message ErrorEvent {
  string code = 1;
  string message = 2;
  string action = 3;
}

// MessageSentEvent 消息发送成功事件
message MessageSentEvent {
  string client_message_id = 1;  // 客户端临时 ID
  Message message = 2;           // 服务端生成的正式消息
}
