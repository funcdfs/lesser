syntax = "proto3";
package feed;

option go_package = "github.com/lesser/feed/proto/feed";

import "common/common.proto";

// ============================================================================
// 消息定义（必须在 service 之前）
// ============================================================================

// Comment 评论实体
message Comment {
  string id = 1;
  string author_id = 2;
  string post_id = 3;
  string parent_id = 4;  // 父评论 ID，用于回复
  string content = 5;
  bool is_deleted = 6;
  common.Timestamp created_at = 7;
  common.Timestamp updated_at = 8;
  int32 reply_count = 9;
}

// Repost 转发实体
message Repost {
  string id = 1;
  string user_id = 2;
  string post_id = 3;
  string quote = 4;  // 转发时的引用文字
  common.Timestamp created_at = 5;
}

// Bookmark 收藏实体
message Bookmark {
  string id = 1;
  string user_id = 2;
  string post_id = 3;
  common.Timestamp created_at = 4;
}

// LikeRequest 点赞请求
message LikeRequest {
  string user_id = 1;
  string post_id = 2;
}

// UnlikeRequest 取消点赞请求
message UnlikeRequest {
  string user_id = 1;
  string post_id = 2;
}


// CreateCommentRequest 创建评论请求
message CreateCommentRequest {
  string author_id = 1;
  string post_id = 2;
  string parent_id = 3;  // 可选，回复评论时使用
  string content = 4;
}

// DeleteCommentRequest 删除评论请求
message DeleteCommentRequest {
  string comment_id = 1;
  string user_id = 2;  // 用于验证权限
}

// ListCommentsRequest 获取评论列表请求
message ListCommentsRequest {
  string post_id = 1;
  string parent_id = 2;  // 可选，获取某评论的回复
  common.Pagination pagination = 3;
}

// ListCommentsResponse 评论列表响应
message ListCommentsResponse {
  repeated Comment comments = 1;
  common.Pagination pagination = 2;
}

// RepostRequest 转发请求
message RepostRequest {
  string user_id = 1;
  string post_id = 2;
  string quote = 3;  // 可选
}

// BookmarkRequest 收藏请求
message BookmarkRequest {
  string user_id = 1;
  string post_id = 2;
}

// UnbookmarkRequest 取消收藏请求
message UnbookmarkRequest {
  string user_id = 1;
  string post_id = 2;
}

// ListBookmarksRequest 获取收藏列表请求
message ListBookmarksRequest {
  string user_id = 1;
  common.Pagination pagination = 2;
}

// ListBookmarksResponse 收藏列表响应
message ListBookmarksResponse {
  repeated Bookmark bookmarks = 1;
  common.Pagination pagination = 2;
}

// ============================================================================
// 服务定义
// ============================================================================

// FeedService Feed 交互服务
service FeedService {
  rpc Like(LikeRequest) returns (common.Empty);
  rpc Unlike(UnlikeRequest) returns (common.Empty);
  rpc CreateComment(CreateCommentRequest) returns (Comment);
  rpc DeleteComment(DeleteCommentRequest) returns (common.Empty);
  rpc ListComments(ListCommentsRequest) returns (ListCommentsResponse);
  rpc CreateRepost(RepostRequest) returns (Repost);
  rpc Bookmark(BookmarkRequest) returns (common.Empty);
  rpc Unbookmark(UnbookmarkRequest) returns (common.Empty);
  rpc ListBookmarks(ListBookmarksRequest) returns (ListBookmarksResponse);
}
