syntax = "proto3";
package channel;

option go_package = "github.com/funcdfs/lesser/channel/gen_protos/channel";

import "common/common.proto";

// ============================================================================
// ChannelService 广播频道服务 (端口: 50062)
// 类似 Telegram Channel，支持单向广播模式
// 使用 gRPC 双向流实现实时更新
// ============================================================================

service ChannelService {
  // ---- 频道管理 ----
  rpc CreateChannel(CreateChannelRequest) returns (Channel);
  rpc GetChannel(GetChannelRequest) returns (Channel);
  rpc UpdateChannel(UpdateChannelRequest) returns (Channel);
  rpc DeleteChannel(DeleteChannelRequest) returns (common.Empty);
  rpc GetSubscribedChannels(GetSubscribedChannelsRequest) returns (ChannelsResponse);
  rpc GetOwnedChannels(GetOwnedChannelsRequest) returns (ChannelsResponse);
  rpc SearchChannels(SearchChannelsRequest) returns (ChannelsResponse);
  
  // ---- 订阅管理 ----
  rpc Subscribe(SubscribeRequest) returns (common.Empty);
  rpc Unsubscribe(UnsubscribeRequest) returns (common.Empty);
  rpc GetSubscribers(GetSubscribersRequest) returns (SubscribersResponse);
  rpc CheckSubscription(CheckSubscriptionRequest) returns (CheckSubscriptionResponse);
  
  // ---- 管理员管理 ----
  rpc AddAdmin(AddAdminRequest) returns (common.Empty);
  rpc RemoveAdmin(RemoveAdminRequest) returns (common.Empty);
  rpc GetAdmins(GetAdminsRequest) returns (AdminsResponse);
  
  // ---- 内容发布 ----
  rpc PublishPost(PublishPostRequest) returns (ChannelPost);
  rpc GetPosts(GetPostsRequest) returns (PostsResponse);
  rpc GetPost(GetPostRequest) returns (ChannelPost);
  rpc EditPost(EditPostRequest) returns (ChannelPost);
  rpc DeletePost(DeletePostRequest) returns (common.Empty);
  rpc PinPost(PinPostRequest) returns (common.Empty);
  rpc UnpinPost(UnpinPostRequest) returns (common.Empty);
  
  // ---- 实时更新（双向流）----
  rpc StreamUpdates(stream ChannelClientEvent) returns (stream ChannelServerEvent);
}

// ============================================================================
// 实体定义
// ============================================================================

message Channel {
  string id = 1;
  string name = 2;
  string description = 3;
  string avatar_url = 4;
  string owner_id = 5;
  repeated string admin_ids = 6;
  int64 subscriber_count = 7;
  int64 post_count = 8;
  common.Timestamp created_at = 9;
  common.Timestamp updated_at = 10;
  bool is_subscribed = 11;
  bool is_admin = 12;
  bool is_owner = 13;
  ChannelPost pinned_post = 14;
  string username = 15;
  bool is_public = 16;
}

message ChannelPost {
  string id = 1;
  string channel_id = 2;
  string author_id = 3;
  string content = 4;
  repeated string media_urls = 5;
  int64 view_count = 6;
  common.Timestamp created_at = 7;
  common.Timestamp updated_at = 8;
  bool is_pinned = 9;
  bool is_edited = 10;
  string author_name = 11;
}

message Subscriber {
  string user_id = 1;
  string username = 2;
  string avatar_url = 3;
  common.Timestamp subscribed_at = 4;
}

message Admin {
  string user_id = 1;
  string username = 2;
  string avatar_url = 3;
  bool is_owner = 4;
  common.Timestamp added_at = 5;
}

// ============================================================================
// 频道管理
// ============================================================================

message CreateChannelRequest {
  string name = 1;
  string description = 2;
  string avatar_url = 3;
  string username = 4;
  bool is_public = 5;
}

message GetChannelRequest {
  string channel_id = 1;
}

message UpdateChannelRequest {
  string channel_id = 1;
  string name = 2;
  string description = 3;
  string avatar_url = 4;
  string username = 5;
  bool is_public = 6;
}

message DeleteChannelRequest {
  string channel_id = 1;
}

message GetSubscribedChannelsRequest {
  string user_id = 1;
  common.Pagination pagination = 2;
}

message GetOwnedChannelsRequest {
  string user_id = 1;
  common.Pagination pagination = 2;
}

message SearchChannelsRequest {
  string query = 1;
  common.Pagination pagination = 2;
}

message ChannelsResponse {
  repeated Channel channels = 1;
  common.Pagination pagination = 2;
}

// ============================================================================
// 订阅管理
// ============================================================================

message SubscribeRequest {
  string channel_id = 1;
}

message UnsubscribeRequest {
  string channel_id = 1;
}

message GetSubscribersRequest {
  string channel_id = 1;
  common.Pagination pagination = 2;
}

message SubscribersResponse {
  repeated Subscriber subscribers = 1;
  common.Pagination pagination = 2;
}

message CheckSubscriptionRequest {
  string channel_id = 1;
}

message CheckSubscriptionResponse {
  bool is_subscribed = 1;
}

// ============================================================================
// 管理员管理
// ============================================================================

message AddAdminRequest {
  string channel_id = 1;
  string user_id = 2;
}

message RemoveAdminRequest {
  string channel_id = 1;
  string user_id = 2;
}

message GetAdminsRequest {
  string channel_id = 1;
}

message AdminsResponse {
  repeated Admin admins = 1;
}

// ============================================================================
// 内容发布
// ============================================================================

message PublishPostRequest {
  string channel_id = 1;
  string content = 2;
  repeated string media_urls = 3;
}

message GetPostsRequest {
  string channel_id = 1;
  common.Pagination pagination = 2;
}

message GetPostRequest {
  string post_id = 1;
}

message EditPostRequest {
  string post_id = 1;
  string content = 2;
  repeated string media_urls = 3;
}

message DeletePostRequest {
  string post_id = 1;
}

message PinPostRequest {
  string post_id = 1;
}

message UnpinPostRequest {
  string post_id = 1;
}

message PostsResponse {
  repeated ChannelPost posts = 1;
  common.Pagination pagination = 2;
}

// ============================================================================
// 双向流事件
// ============================================================================

// ---- 客户端事件 ----

message ChannelClientEvent {
  oneof event {
    ChannelSubscribeEvent subscribe = 1;
    ChannelUnsubscribeEvent unsubscribe = 2;
    ChannelPingEvent ping = 3;
  }
}

message ChannelSubscribeEvent {
  string channel_id = 1;
}

message ChannelUnsubscribeEvent {
  string channel_id = 1;
}

message ChannelPingEvent {}

// ---- 服务端事件 ----

message ChannelServerEvent {
  oneof event {
    NewPostEvent new_post = 1;
    PostEditedEvent post_edited = 2;
    PostDeletedEvent post_deleted = 3;
    PostPinnedEvent post_pinned = 4;
    PostUnpinnedEvent post_unpinned = 5;
    ChannelUpdatedEvent channel_updated = 6;
    ChannelDeletedEvent channel_deleted = 7;
    ChannelSubscribedEvent subscribed = 8;
    ChannelUnsubscribedEvent unsubscribed = 9;
    ChannelPongEvent pong = 10;
    ChannelErrorEvent error = 11;
  }
}

message NewPostEvent {
  ChannelPost post = 1;
}

message PostEditedEvent {
  ChannelPost post = 1;
}

message PostDeletedEvent {
  string post_id = 1;
  string channel_id = 2;
}

message PostPinnedEvent {
  ChannelPost post = 1;
}

message PostUnpinnedEvent {
  string post_id = 1;
  string channel_id = 2;
}

message ChannelUpdatedEvent {
  Channel channel = 1;
}

message ChannelDeletedEvent {
  string channel_id = 1;
}

message ChannelSubscribedEvent {
  string channel_id = 1;
}

message ChannelUnsubscribedEvent {
  string channel_id = 1;
}

message ChannelPongEvent {}

message ChannelErrorEvent {
  string code = 1;
  string message = 2;
  string action = 3;
}
