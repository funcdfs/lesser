syntax = "proto3";
package search;

option go_package = "github.com/funcdfs/lesser/search/proto/search";

import "common/common.proto";

// SearchService 搜索服务
service SearchService {
  rpc SearchPosts(SearchPostsRequest) returns (SearchPostsResponse);
  rpc SearchUsers(SearchUsersRequest) returns (SearchUsersResponse);
}

// SearchPostsRequest 搜索帖子请求
message SearchPostsRequest {
  string query = 1;
  common.Pagination pagination = 2;
}

// PostResult 帖子搜索结果
message PostResult {
  string id = 1;
  string author_id = 2;
  string title = 3;
  string content = 4;
  repeated string media_urls = 5;
  common.Timestamp created_at = 6;
}

// SearchPostsResponse 搜索帖子响应
message SearchPostsResponse {
  repeated PostResult posts = 1;
  common.Pagination pagination = 2;
}

// SearchUsersRequest 搜索用户请求
message SearchUsersRequest {
  string query = 1;
  common.Pagination pagination = 2;
}

// UserResult 用户搜索结果
message UserResult {
  string id = 1;
  string username = 2;
  string display_name = 3;
  string avatar_url = 4;
  string bio = 5;
}

// SearchUsersResponse 搜索用户响应
message SearchUsersResponse {
  repeated UserResult users = 1;
  common.Pagination pagination = 2;
}
