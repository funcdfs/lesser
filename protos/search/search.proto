syntax = "proto3";
package search;

option go_package = "github.com/funcdfs/lesser/search/gen_protos/search";

import "common/common.proto";

// ============================================================================
// SearchService 搜索服务 (端口: 50058)
// 提供内容、用户、评论的全文搜索和语义搜索
// ============================================================================

service SearchService {
  // 搜索内容（帖子）
  rpc SearchPosts(SearchPostsRequest) returns (SearchPostsResponse);
  
  // 搜索用户
  rpc SearchUsers(SearchUsersRequest) returns (SearchUsersResponse);
  
  // 搜索评论
  rpc SearchComments(SearchCommentsRequest) returns (SearchCommentsResponse);
  
  // 综合搜索
  rpc SearchAll(SearchAllRequest) returns (SearchAllResponse);
}

// ============================================================================
// 搜索结果实体
// ============================================================================

message PostResult {
  string id = 1;
  string author_id = 2;
  string title = 3;
  string content = 4;
  repeated string media_urls = 5;
  common.Timestamp created_at = 6;
  float score = 7;
}

message UserResult {
  string id = 1;
  string username = 2;
  string display_name = 3;
  string avatar_url = 4;
  string bio = 5;
  float score = 6;
}

message CommentResult {
  string id = 1;
  string author_id = 2;
  string post_id = 3;
  string content = 4;
  common.Timestamp created_at = 5;
  float score = 6;
}

// ============================================================================
// 请求/响应消息
// ============================================================================

message SearchPostsRequest {
  string query = 1;
  common.Pagination pagination = 2;
  bool use_semantic = 3;  // 是否使用语义搜索（pgvector）
}

message SearchPostsResponse {
  repeated PostResult posts = 1;
  common.Pagination pagination = 2;
}

message SearchUsersRequest {
  string query = 1;
  common.Pagination pagination = 2;
  bool use_semantic = 3;
}

message SearchUsersResponse {
  repeated UserResult users = 1;
  common.Pagination pagination = 2;
}

message SearchCommentsRequest {
  string query = 1;
  common.Pagination pagination = 2;
  bool use_semantic = 3;
  string post_id = 4;  // 可选：限定在某个帖子下搜索
}

message SearchCommentsResponse {
  repeated CommentResult comments = 1;
  common.Pagination pagination = 2;
}

message SearchAllRequest {
  string query = 1;
  int32 limit = 2;  // 每种类型返回的最大数量
  bool use_semantic = 3;
}

message SearchAllResponse {
  repeated PostResult posts = 1;
  repeated CommentResult comments = 2;
  repeated UserResult users = 3;
}
