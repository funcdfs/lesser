syntax = "proto3";
package timeline;

option go_package = "github.com/funcdfs/lesser/timeline/gen_protos/timeline";

import "common/common.proto";
import "content/content.proto";

// ============================================================================
// TimelineService 时间线服务 (端口: 50057)
// 提供 Feed 流聚合功能
// ============================================================================

service TimelineService {
  // 获取关注用户的 Feed
  rpc GetFollowingFeed(GetFollowingFeedRequest) returns (GetFollowingFeedResponse);
  
  // 获取推荐 Feed（预留）
  rpc GetRecommendFeed(GetRecommendFeedRequest) returns (GetRecommendFeedResponse);
  
  // 获取指定用户的 Feed（用户主页）
  rpc GetUserFeed(GetUserFeedRequest) returns (GetUserFeedResponse);
  
  // 获取热门 Feed
  rpc GetHotFeed(GetHotFeedRequest) returns (GetHotFeedResponse);
  
  // 获取内容详情（包含交互状态）
  rpc GetContentDetail(GetContentDetailRequest) returns (GetContentDetailResponse);
}

// ============================================================================
// 实体定义
// ============================================================================

message FeedItem {
  content.Content content = 1;
  bool is_liked = 2;
  bool is_bookmarked = 3;
  bool is_reposted = 4;
}

// ============================================================================
// 请求/响应消息
// ============================================================================

message GetFollowingFeedRequest {
  string user_id = 1;
  common.Pagination pagination = 2;
}

message GetFollowingFeedResponse {
  repeated FeedItem items = 1;
  common.Pagination pagination = 2;
}

message GetRecommendFeedRequest {
  string user_id = 1;
  common.Pagination pagination = 2;
}

message GetRecommendFeedResponse {
  repeated FeedItem items = 1;
  common.Pagination pagination = 2;
}

message GetUserFeedRequest {
  string user_id = 1;
  string viewer_id = 2;
  common.Pagination pagination = 3;
}

message GetUserFeedResponse {
  repeated FeedItem items = 1;
  common.Pagination pagination = 2;
}

message GetHotFeedRequest {
  string user_id = 1;
  common.Pagination pagination = 2;
  string time_range = 3;  // day, week, month
}

message GetHotFeedResponse {
  repeated FeedItem items = 1;
  common.Pagination pagination = 2;
}

message GetContentDetailRequest {
  string content_id = 1;
  string viewer_id = 2;
}

message GetContentDetailResponse {
  FeedItem item = 1;
}
