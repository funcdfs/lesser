syntax = "proto3";
package common;

option go_package = "github.com/funcdfs/lesser/pkg/gen_protos/common";

// ============================================================================
// 通用消息定义
// 供所有服务共享使用
// ============================================================================

// Empty 空消息，用于无返回值的响应
message Empty {}

// Pagination 分页参数
message Pagination {
  int32 page = 1;       // 页码，从 1 开始
  int32 page_size = 2;  // 每页数量
  int32 total = 3;      // 总数（响应时填充）
}

// Timestamp 时间戳
message Timestamp {
  int64 seconds = 1;  // Unix 秒
  int32 nanos = 2;    // 纳秒部分
}

// ErrorDetail 错误详情
message ErrorDetail {
  string code = 1;               // 错误码
  string message = 2;            // 错误消息
  map<string, string> metadata = 3;  // 附加信息
}

// ============================================================================
// 健康检查服务
// ============================================================================

service HealthService {
  // 检查服务健康状态
  rpc Check(HealthCheckRequest) returns (HealthCheckResponse);
  // 监听服务健康状态变化（流式）
  rpc Watch(HealthCheckRequest) returns (stream HealthCheckResponse);
}

message HealthCheckRequest {
  string service = 1;  // 服务名称，空表示检查整体健康
}

message HealthCheckResponse {
  enum ServingStatus {
    UNKNOWN = 0;
    SERVING = 1;
    NOT_SERVING = 2;
    SERVICE_UNKNOWN = 3;
  }
  ServingStatus status = 1;
}
