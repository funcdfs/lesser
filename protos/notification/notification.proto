syntax = "proto3";
package notification;

option go_package = "github.com/lesser/notification_worker/proto/notification";

import "common/common.proto";

// NotificationService 通知服务
service NotificationService {
  rpc List(ListNotificationsRequest) returns (ListNotificationsResponse);
  rpc Read(ReadNotificationRequest) returns (common.Empty);
  rpc ReadAll(ReadAllNotificationsRequest) returns (common.Empty);
  rpc GetUnreadCount(GetUnreadCountRequest) returns (UnreadCountResponse);
}

// NotificationType 通知类型
enum NotificationType {
  NOTIFICATION_TYPE_UNSPECIFIED = 0;
  LIKE = 1;
  COMMENT = 2;
  REPLY = 3;
  BOOKMARK = 4;
  MENTION = 5;
  FOLLOW = 6;
  REPOST = 7;
}

// Notification 通知实体
message Notification {
  string id = 1;
  string user_id = 2;
  NotificationType type = 3;
  string actor_id = 4;
  string target_type = 5;  // post, comment, user
  string target_id = 6;
  string message = 7;
  bool is_read = 8;
  common.Timestamp created_at = 9;
}

// ListNotificationsRequest 获取通知列表请求
message ListNotificationsRequest {
  string user_id = 1;
  bool unread_only = 2;  // 是否只获取未读
  common.Pagination pagination = 3;
}

// ListNotificationsResponse 通知列表响应
message ListNotificationsResponse {
  repeated Notification notifications = 1;
  common.Pagination pagination = 2;
}

// ReadNotificationRequest 标记单条通知已读请求
message ReadNotificationRequest {
  string notification_id = 1;
  string user_id = 2;
}

// ReadAllNotificationsRequest 标记所有通知已读请求
message ReadAllNotificationsRequest {
  string user_id = 1;
}

// GetUnreadCountRequest 获取未读数请求
message GetUnreadCountRequest {
  string user_id = 1;
}

// UnreadCountResponse 未读数响应
message UnreadCountResponse {
  int32 count = 1;
}

// CreateNotificationRequest 创建通知请求（内部使用）
message CreateNotificationRequest {
  string user_id = 1;
  NotificationType type = 2;
  string actor_id = 3;
  string target_type = 4;
  string target_id = 5;
  string message = 6;
}
