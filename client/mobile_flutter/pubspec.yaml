name: mobile_flutter
description: "Lesser - A social platform client"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # Networking
  dio: ^5.4.3+1
  web_socket_channel: ^3.0.1
  grpc: ^4.0.1
  protobuf: ^3.1.0
  
  # Local Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2
  
  # Routing
  go_router: ^14.2.0
  
  # Dependency Injection
  get_it: ^7.7.0
  injectable: ^2.4.2
  
  # Functional Programming
  dartz: ^0.10.1
  
  # Utilities
  equatable: ^2.0.5
  json_annotation: ^4.9.0
  intl: ^0.19.0
  logger: ^2.3.0
  connectivity_plus: ^6.0.3
  
  # Code Generation (runtime)
  freezed_annotation: ^2.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  
  # Testing
  mockito: ^5.4.4
  build_runner: ^2.4.11
  
  # Code Generation
  json_serializable: ^6.8.0
  freezed: ^2.5.2
  riverpod_generator: ^2.4.0
  injectable_generator: ^2.6.1

flutter:
  uses-material-design: true
