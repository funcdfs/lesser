name: mobile_flutter
description: "Lesser - A social platform client"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0
  
  # Networking
  grpc: ^5.1.0
  protobuf: ^6.0.0
  
  # Local Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^10.0.0
  
  # Routing
  go_router: ^17.0.1
  
  # Dependency Injection
  get_it: ^9.2.0
  injectable: ^2.7.1
  
  # Functional Programming
  dartz: ^0.10.1
  
  # Utilities
  equatable: ^2.0.5
  json_annotation: ^4.9.0
  intl: ^0.20.2
  logger: ^2.3.0
  connectivity_plus: ^7.0.0
  
  # Code Generation (runtime)
  freezed_annotation: ^3.1.0
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  
  # Testing
  mockito: ^5.6.1
  build_runner: ^2.10.4
  
  # Code Generation
  json_serializable: ^6.11.2
  freezed: ^3.2.3
  riverpod_generator: ^4.0.0
  injectable_generator: ^2.7.0

flutter:
  uses-material-design: true
