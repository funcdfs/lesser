# ============================================================================
# Air 热重载配置 (通用)
# 适用于所有 Go 微服务
# ============================================================================

root = "."
tmp_dir = "tmp"

[build]
  # 大多数服务入口在 ./cmd/server，gateway 在 .
  # 使用 || 兼容两种情况
  cmd = "go build -o ./tmp/main ./cmd/server 2>/dev/null || go build -o ./tmp/main ."
  bin = "./tmp/main"
  delay = 1000
  exclude_dir = ["assets", "tmp", "vendor", "node_modules", "testdata"]
  exclude_file = []
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  follow_symlink = false
  full_bin = ""
  include_dir = []
  include_ext = ["go", "tpl", "tmpl", "html"]
  kill_delay = "2s"
  log = "build-errors.log"
  send_interrupt = false
  stop_on_error = true

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  time = false

[misc]
  clean_on_exit = true
