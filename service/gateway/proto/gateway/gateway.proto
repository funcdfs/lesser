syntax = "proto3";
package gateway;

option go_package = "github.com/lesser/gateway/proto/gateway";

// GatewayService 网关服务
// 设计要点：
// 1. Gateway 只做 JWT 验签、限流、路由，不做业务逻辑
// 2. 业务请求直接转发到对应 Service（Auth/User/Post/Feed/Chat/Search/Notification）
// 3. Gateway 本身只提供健康检查接口
service GatewayService {
  // Health 健康检查
  rpc Health(HealthRequest) returns (HealthResponse);
}

// HealthRequest 健康检查请求
message HealthRequest {}

// HealthResponse 健康检查响应
message HealthResponse {
  bool healthy = 1;
  map<string, bool> services = 2;  // 各服务健康状态
}
