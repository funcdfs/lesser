# Traefik 主配置文件
global:
  checkNewVersion: true
  sendAnonymousUsage: false

# 日志配置
log:
  level: INFO
  format: common

# 访问日志
accessLog:
  enabled: true
  format: json
  filePath: /var/log/traefik/access.log

# 入口点配置
entryPoints:
  web:
    address: ":80"
    # 将 HTTP 请求重定向到 HTTPS
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https

  websecure:
    address: ":443"
    http:
      tls:
        # 使用自动生成的证书（开发环境）
        certResolver: myresolver

# API 和仪表盘
api:
  dashboard: true
  insecure: true  # 仅在开发环境使用，生产环境应设置为 false

# 提供商配置
providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: gateway_network
  file:
    filename: "/etc/traefik/dynamic.yml"
    watch: true

# 证书解析器
certificatesResolvers:
  myresolver:
    acme:
      email: your-email@example.com
      storage: /etc/traefik/acme.json
      httpChallenge:
        entryPoint: web