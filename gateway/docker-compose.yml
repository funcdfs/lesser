version: '3.8'

services:
  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"      # HTTP 端口
      - "443:443"    # HTTPS 端口
      - "8080:8080"  # 控制面板端口
    volumes:
      - "./traefik.yml:/etc/traefik/traefik.yml:ro"
      - "./dynamic.yml:/etc/traefik/dynamic.yml:ro"
      - "./certs:/etc/traefik/certs:ro"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"  # 允许 Traefik 访问 Docker API
    environment:
      - "TZ=Asia/Shanghai"
    networks:
      - gateway

networks:
  gateway:
    external: true
    name: gateway_network